<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Notes – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151; --deep: #0f172a;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280;
      --accent: #7c3aed; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
      --surface: #1a2332;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overscroll-behavior: none; }

    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; padding-top: max(12px, env(safe-area-inset-top)); }
    .logo { font-size: 16px; font-weight: 700; color: #a78bfa; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--accent); color: #fff; }
    .nav-toggle { display: none; background: transparent; border: none; cursor: pointer; padding: 6px 8px; margin-left: auto; color: var(--text); }
    .nav-toggle svg { display: block; width: 22px; height: 22px; }
    .refresh-btn { display: none; background: transparent; border: none; cursor: pointer; padding: 6px 8px; color: var(--text); flex-shrink: 0; }
    .refresh-btn svg { display: block; width: 20px; height: 20px; }

    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

    /* Capture area */
    .capture {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; margin-bottom: 24px;
    }
    .capture-textarea {
      width: 100%; min-height: 90px; padding: 12px; background: var(--deep);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.5;
      resize: vertical; outline: none;
    }
    .capture-textarea:focus { border-color: var(--accent); }
    .capture-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .capture-hint { font-size: 11px; color: var(--dim); }
    .save-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 9px 18px; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 600;
    }
    .save-btn:hover { opacity: .9; }
    .save-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Section headers */
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; }
    .section-label .count { background: var(--border); color: var(--muted); padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 600; }
    .toggle-cleared {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 11px;
    }
    .toggle-cleared.on { border-color: var(--accent); color: #a78bfa; }

    /* Note card */
    .note {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 6px; display: flex; gap: 12px; align-items: flex-start;
    }
    .note.cleared { opacity: .55; }
    .note-body { flex: 1; min-width: 0; font-size: 14px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .note-meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
    .note-actions { display: flex; flex-direction: column; flex-wrap: nowrap; gap: 4px; flex-shrink: 0; }
    .note-btn {
      background: var(--deep); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 10px; border-radius: 6px; cursor: pointer; font-family: inherit;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .note-btn:hover { border-color: var(--accent); color: var(--text); }
    .note-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .note-btn.danger:hover { border-color: var(--err); color: var(--err); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; max-width: 360px; margin: 0 auto; }

    .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

    /* Mobile */
    @media (max-width: 600px) {
      header { padding: 10px 16px; flex-wrap: wrap; }
      .logo { font-size: 15px; flex: 1; }
      .refresh-btn { display: inline-flex; align-items: center; justify-content: center; }
      .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
      .nav-links {
        position: fixed; top: 49px; left: 0; right: 0; bottom: 0;
        background: var(--card); border-bottom: 1px solid var(--border);
        flex-direction: column; flex-wrap: nowrap; gap: 0; padding: 6px 0;
        max-height: 0; height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s ease;
        z-index: 100; width: 100%;
      }
      .nav-links.open { max-height: calc(100vh - 49px); height: calc(100vh - 49px); overflow-y: auto; padding: 6px 0; }
      .nav-links a { padding: 14px 24px; border-radius: 0; font-size: 15px; }
      main { padding: 16px 12px 80px; max-width: 100%; }
      /* Mobile overflow guard (June 17, 2026) */
      html, body { overflow-x: hidden; }
      .capture-textarea { font-size: 16px; min-height: 110px; }
      .save-btn { padding: 12px 20px; font-size: 14px; }
      .note-btn { padding: 8px 12px; font-size: 12px; min-height: 36px; }
      .note { padding: 12px; }
      .note-body { word-break: break-word; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">⬡ Second Brain</a>
  <nav class="nav-links" id="nav">
    <a href="index.html">Home</a>
    <a href="fitness.html">Fitness</a>
    <a href="tasks.html">Tasks</a>
    <a href="releases.html">Releases</a>
    <a href="notes.html" class="active">Notes</a>
    <a href="reset.html">Reset</a>
    <a href="journal.html">Journal</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
  <button class="refresh-btn" onclick="load()" aria-label="Refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
  </button>
  <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>

<main>
  <h1>Notes</h1>
  <div class="subtitle">Free-text inbox. Paste anything — exercises, ideas, quotes. Triage during shutdown.</div>

  <div class="capture">
    <textarea class="capture-textarea" id="capture" placeholder="What's on your mind? Paste a workout log, dump a thought, anything…"></textarea>
    <div class="capture-actions">
      <span class="capture-hint">⌘+Enter to save</span>
      <button class="save-btn" id="save-btn">+ Save Note</button>
    </div>
  </div>

  <div id="view">Loading…</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
<script>
let NOTES = [];
let SHOW_CLEARED = false;
let EDITING_ID = null;
let EDIT_BUFFER = '';

async function load() {
  await window._authReadyPromise;
  const { data, error } = await window.sb.from('notes').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('view').innerHTML =
      `<div class="empty-state"><h2>Couldn't load notes</h2><p>${escapeHTML(error.message)}</p></div>`;
    return;
  }
  NOTES = data || [];
  render();
}

function render() {
  const open    = NOTES.filter(n => !n.done);
  const cleared = NOTES.filter(n => n.done);
  const v = document.getElementById('view');

  let html = `
    <div class="section-label">
      <span>Open <span class="count">${open.length}</span></span>
    </div>
  `;

  if (open.length === 0) {
    html += `
      <div class="empty-state">
        <h2>Inbox is empty</h2>
        <p>Capture anything above. Notes pile up here until you triage them during shutdown.</p>
      </div>`;
  } else {
    html += open.map(noteHTML).join('');
  }

  html += `
    <div class="section-label" style="margin-top:28px">
      <span>Cleared <span class="count">${cleared.length}</span></span>
      <button class="toggle-cleared ${SHOW_CLEARED ? 'on' : ''}" onclick="toggleCleared()">${SHOW_CLEARED ? 'hide' : 'show'}</button>
    </div>
  `;

  if (SHOW_CLEARED) {
    if (cleared.length === 0) {
      html += `<div class="empty-state"><p>No cleared notes yet.</p></div>`;
    } else {
      html += cleared.map(noteHTML).join('');
    }
  }

  v.innerHTML = html;
}

function noteHTML(n) {
  if (EDITING_ID === n.id) {
    // Editing UI: Save/Cancel live INSIDE the body area (not in the side action column),
    // so after save re-renders, the Save button position is NOT where Mark Cleared appears.
    // Prevents the double-tap-save = accidental-clear bug.
    return `
      <div class="note editing" style="display:block">
        <textarea id="edit-${n.id}" class="capture-textarea" style="min-height:120px;margin-bottom:8px" autofocus>${escapeHTML(n.body)}</textarea>
        <div class="note-meta" style="margin-bottom:10px">${fmtWhen(n.created_at)}${n.done && n.cleared_at ? ' · cleared ' + fmtWhen(n.cleared_at) : ''} · editing</div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="note-btn" onclick="cancelEdit()" style="padding:10px 18px">Cancel</button>
          <button class="note-btn primary" onclick="saveEdit('${n.id}')" style="padding:10px 18px">Save</button>
        </div>
      </div>`;
  }
  return `
    <div class="note ${n.done ? 'cleared' : ''}">
      <div class="note-body" onclick="startEdit('${n.id}')" style="cursor:text">
        ${escapeHTML(n.body)}
        <div class="note-meta">${fmtWhen(n.created_at)}${n.done && n.cleared_at ? ' · cleared ' + fmtWhen(n.cleared_at) : ''} · <span style="opacity:.7">tap to edit</span></div>
      </div>
      <div class="note-actions">
        ${n.done
          ? `<button class="note-btn" onclick="restoreNote('${n.id}')">Restore</button>
             <button class="note-btn danger" onclick="deleteNote('${n.id}')">Delete</button>`
          : `<button class="note-btn primary" onclick="clearNote('${n.id}')">Mark cleared</button>
             <button class="note-btn danger" onclick="deleteNote('${n.id}')">Delete</button>`}
      </div>
    </div>`;
}

function startEdit(id) {
  EDITING_ID = id;
  const note = NOTES.find(n => n.id === id);
  EDIT_BUFFER = note ? note.body : '';
  render();
  // Auto-focus + place cursor at end
  setTimeout(() => {
    const ta = document.getElementById('edit-' + id);
    if (ta) {
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      // Auto-grow textarea to fit content
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
      });
      ta.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); saveEdit(id); }
        if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
      });
    }
  }, 30);
}

async function saveEdit(id) {
  const ta = document.getElementById('edit-' + id);
  if (!ta) return;
  const body = ta.value.trim();
  if (!body) { alert('Note body cannot be empty. Use Delete if you want to remove.'); return; }
  const { error } = await window.sb.from('notes').update({ body }).eq('id', id);
  if (error) { alert(error.message); return; }
  EDITING_ID = null;
  EDIT_BUFFER = '';
  await load();
}

function cancelEdit() {
  EDITING_ID = null;
  EDIT_BUFFER = '';
  render();
}

async function saveNote() {
  const ta = document.getElementById('capture');
  const body = ta.value.trim();
  if (!body) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  const { error } = await window.sb.from('notes').insert({ body });
  btn.disabled = false;
  if (error) { alert(error.message); return; }
  ta.value = '';
  await load();
  ta.focus();
}

async function clearNote(id) {
  const { error } = await window.sb.from('notes').update({ done: true, cleared_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert(error.message); return; }
  await load();
}

async function restoreNote(id) {
  const { error } = await window.sb.from('notes').update({ done: false, cleared_at: null }).eq('id', id);
  if (error) { alert(error.message); return; }
  await load();
}

async function deleteNote(id) {
  if (!confirm('Delete this note permanently?')) return;
  const { error } = await window.sb.from('notes').delete().eq('id', id);
  if (error) { alert(error.message); return; }
  await load();
}

function toggleCleared() {
  SHOW_CLEARED = !SHOW_CLEARED;
  render();
}

function fmtWhen(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  if (diffMin < 24 * 60) return `${Math.floor(diffMin / 60)}h ago`;
  const days = Math.floor(diffMin / (60 * 24));
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

// Wiring
document.getElementById('save-btn').addEventListener('click', saveNote);
document.getElementById('capture').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); saveNote(); }
});
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav').classList.toggle('open');
});
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => document.getElementById('nav').classList.remove('open'));
});

load();
</script>
</body>
</html>
