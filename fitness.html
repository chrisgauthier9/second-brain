<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Second Brain">
  <meta name="theme-color" content="#111827">
  <title>Fitness – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    header { background: #1f2937; border-bottom: 1px solid #374151; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: #9ca3af; text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background .15s; white-space: nowrap; }
    .nav-links a:hover { background: #374151; color: #f3f4f6; }
    .nav-links a.active { background: #7c3aed; color: #fff; }
    .nav-meta { font-size: 12px; color: #6b7280; white-space: nowrap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151; --text: #f3f4f6;
      --muted: #9ca3af; --dim: #6b7280; --deep: #0f172a;
      --upper-a: #60a5fa; --lower-a: #34d399; --upper-b: #a78bfa;
      --lower-b: #fbbf24; --arms: #f472b6; --misc: #94a3b8;
      --back: #60a5fa; --biceps: #a78bfa; --calves: #94a3b8;
      --chest: #f87171; --glutes: #fbbf24; --hamstrings: #fef08a;
      --quads: #34d399; --shoulders: #818cf8; --triceps: #f472b6;
      --active: #34d399; --complete: #60a5fa; --deload: #fbbf24; --planned: #94a3b8;
      --rpe-high: #f87171; --rpe-mid: #fbbf24; --rpe-low: #34d399;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
    .tabs { display: flex; gap: 4px; background: var(--deep); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 8px 0; border: none; border-radius: 8px; background: transparent; color: var(--dim); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; transition: all .15s; }
    .tab.active { background: var(--card); color: var(--text); }
    .back-btn { background: none; border: none; color: var(--upper-a); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 0; margin-bottom: 14px; display: flex; align-items: center; gap: 4px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; width: 100%; text-align: left; font-family: inherit; cursor: pointer; display: block; color: var(--text); text-decoration: none; transition: border-color .15s; }
    .card:hover { border-color: #7c3aed; }
    .set-row { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--deep); border-radius: 6px; font-size: 13px; }
    .set-num { color: var(--dim); width: 20px; font-weight: 600; flex-shrink: 0; }
    .set-wt { color: var(--text); font-weight: 700; min-width: 58px; }
    .set-reps { color: var(--muted); }
    .set-rpe { font-size: 11px; font-weight: 700; margin-left: auto; }
    .pill { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; display: inline-block; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .stat-tile { padding: 12px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; text-align: center; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-val.sm { font-size: 13px; }
    .stat-label { font-size: 10px; color: var(--dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
    .stat-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .progress-bar { background: var(--border); border-radius: 6px; height: 5px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; border-radius: 6px; }
    .section-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin: 0 0 10px; }
    .exercise-bar { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; padding: 0; cursor: default; background: transparent; }
    .cal-day.has-session { cursor: pointer; }
    .cal-day.today { border: 1.5px solid var(--muted); }
    .cal-day-num { font-size: 12px; font-weight: 500; color: var(--dim); }
    .cal-day.has-session .cal-day-num { font-weight: 700; color: #111827; }
    .cal-day-label { font-size: 7px; font-weight: 700; color: #111827; margin-top: -1px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; opacity: 0.8; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-nav { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 14px; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .cal-month { font-size: 13px; font-weight: 600; color: var(--muted); }
    .cal-dow { text-align: center; font-size: 10px; color: var(--border); font-weight: 600; padding: 2px 0; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .legend-label { font-size: 10px; color: var(--dim); }
    .search-input { width: 100%; padding: 9px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .search-input:focus { border-color: #7c3aed; }
    .muscle-pills { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
    .muscle-pills::-webkit-scrollbar { display: none; }
    .muscle-pill { padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; background: transparent; color: var(--muted); transition: all .15s; }
    .muscle-pill.active { border-color: #7c3aed; color: #fff; background: #7c3aed22; }
    .session-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--deep); border-radius: 8px; border: 1px solid var(--border); cursor: pointer; margin-bottom: 4px; font-family: inherit; text-align: left; color: var(--text); transition: border-color .15s; }
    .session-btn:hover { border-color: #7c3aed; }
    .workout-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="fitness.html" class="active">Fitness</a>
    <a href="balance.html">Balance</a>
    <a href="journal.html">Journal</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
</header>
<div class="wrap" id="app">
  <div class="loading">Loading gym data...</div>
</div>

<script>
const SUPABASE_URL = 'https://pkdbzoptboinysspnpjp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3AzsiWvSIyBQ876U61ahbQ_vQtkdO6J';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const workoutColors = {"Upper A":"var(--upper-a)","Lower A":"var(--lower-a)","Upper B":"var(--upper-b)","Lower B":"var(--lower-b)","Arms + Shoulders":"var(--arms)","Push A":"var(--misc)"};
const muscleColors = {Back:"var(--back)",Biceps:"var(--biceps)",Calves:"var(--calves)",Chest:"var(--chest)",Glutes:"var(--glutes)",Hamstrings:"var(--hamstrings)",Quads:"var(--quads)",Shoulders:"var(--shoulders)",Triceps:"var(--triceps)"};
const statusColors = {Active:"var(--active)",Complete:"var(--complete)",Deload:"var(--deload)",Planned:"var(--planned)"};

let DATA = { exercises:[], mesocycles:[], sessions:[], sets:[] };
let STATE = { tab:'mesos', detail:null };

async function loadData() {
  const [exRes, mesoRes, setsRes] = await Promise.all([
    sb.from('exercises').select('*').order('name'),
    sb.from('mesocycles').select('*').order('start_date', {ascending:false}),
    sb.from('sets_log').select('*, exercises(name, muscle_group, equipment)').order('date').order('exercise_order').order('set_number'),
  ]);
  DATA.exercises = exRes.data || [];
  DATA.mesocycles = mesoRes.data || [];
  DATA.sets = setsRes.data || [];

  const sessMap = new Map();
  for (const s of DATA.sets) {
    const key = `${s.date}|${s.workout_name}`;
    if (!sessMap.has(key)) sessMap.set(key, { date:s.date, workout:s.workout_name, meso_id:s.mesocycle_id, week:s.week_number, sets:[] });
    sessMap.get(key).sets.push(s);
  }
  DATA.sessions = Array.from(sessMap.values()).sort((a,b) => b.date.localeCompare(a.date));
  render();
}

function wc(w) { return workoutColors[w] || 'var(--misc)'; }
function mc(m) { return muscleColors[m] || 'var(--misc)'; }
function sc(s) { return statusColors[s] || 'var(--planned)'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(iso) { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+d}`; }
function fmtFull(iso) { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+d}, ${y}`; }
function getMeso(id) { return DATA.mesocycles.find(m=>m.id===id); }

// Calculate weeks from start/end dates
function calcWeeks(meso) {
  if (!meso.start_date || !meso.end_date) return null;
  const start = new Date(meso.start_date);
  const end = new Date(meso.end_date);
  return Math.round((end - start) / (7 * 24 * 60 * 60 * 1000));
}

function setRow(s) {
  const rpeColor = s.rpe >= 9 ? 'var(--rpe-high)' : s.rpe >= 7 ? 'var(--rpe-mid)' : 'var(--rpe-low)';
  const reps = s.actual_reps != null ? `x${s.actual_reps}` : (s.target_reps ? `x${s.target_reps} target` : '—');
  return `<div class="set-row"><span class="set-num">${s.set_number}</span><span class="set-wt">${s.weight != null ? s.weight+'lb' : '—'}</span><span class="set-reps">${reps}</span>${s.rpe ? `<span class="set-rpe" style="color:${rpeColor}">RPE ${s.rpe}</span>` : ''}</div>`;
}

function showDetail(type, data) { STATE.detail = {type, data}; render(); }
function goBack() { STATE.detail = null; render(); }

function render() {
  const app = document.getElementById('app');
  if (STATE.detail) {
    let html = `<button class="back-btn" onclick="goBack()">← Back</button>`;
    if (STATE.detail.type === 'meso') html += renderMesoDetail(STATE.detail.data);
    else if (STATE.detail.type === 'session') html += renderSessionDetail(STATE.detail.data);
    else if (STATE.detail.type === 'exercise') html += renderExerciseDetail(STATE.detail.data);
    app.innerHTML = html;
    return;
  }
  const tabs = `<div class="tabs">${['mesos','sessions','exercises'].map(t=>`<button class="tab${STATE.tab===t?' active':''}" onclick="STATE.tab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div>`;
  let content = '';
  if (STATE.tab === 'mesos') content = renderMesos();
  else if (STATE.tab === 'sessions') content = renderSessions();
  else content = renderExercises();
  app.innerHTML = tabs + content;
}

function renderMesos() {
  if (DATA.mesocycles.length === 0) return `<div class="loading">No mesocycles found</div>`;
  return DATA.mesocycles.map(m => {
    const mSets = DATA.sets.filter(s => s.mesocycle_id === m.id);
    const mSess = DATA.sessions.filter(s => s.meso_id === m.id);
    const weeks = calcWeeks(m);
    const elapsed = mSess.length > 0 ? Math.max(...mSess.map(s => s.week || 0)) : 0;
    const pct = weeks > 0 ? Math.min(100, Math.round(elapsed / weeks * 100)) : 0;
    const color = sc(m.status);
    const weeksLabel = weeks != null ? `${weeks} wks` : '';
    return `<button class="card" onclick="showDetail('meso',DATA.mesocycles.find(x=>x.id===${m.id}))">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:16px;font-weight:700">${esc(m.name)}</span>
        <span class="pill" style="background:${color}22;color:${color}">${m.status}</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${m.split_type||''} · ${weeksLabel} · ${fmt(m.start_date)} – ${fmt(m.end_date)}</div>
      ${weeks > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>` : ''}
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--dim)">
        <span>${mSess.length} sessions</span><span>${mSets.length} sets</span>
      </div>
    </button>`;
  }).join('');
}

function renderMesoDetail(meso) {
  const sessions = DATA.sessions.filter(s => s.meso_id === meso.id);
  const mSets = DATA.sets.filter(s => s.mesocycle_id === meso.id);
  const color = sc(meso.status);
  const weeks = calcWeeks(meso);
  let html = `<div style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <h2 style="font-size:20px;font-weight:700">${esc(meso.name)}</h2>
      <span class="pill" style="background:${color}22;color:${color}">${meso.status}</span>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${meso.split_type||''} · ${weeks != null ? weeks+' wks' : ''} · ${fmt(meso.start_date)} – ${fmt(meso.end_date)}</div>
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-val">${sessions.length}</div><div class="stat-label">Sessions</div></div>
      <div class="stat-tile"><div class="stat-val">${mSets.length}</div><div class="stat-label">Sets</div></div>
      <div class="stat-tile"><div class="stat-val">${weeks != null ? weeks : '—'}</div><div class="stat-label">Weeks</div></div>
    </div>
  </div>`;
  html += renderCalendar(meso);
  if (sessions.length > 0) {
    html += `<h3 class="section-label" style="margin-top:20px">Sessions</h3>`;
    for (const sess of sessions) {
      const sc2 = DATA.sets.filter(s=>s.date===sess.date&&s.workout_name===sess.workout).length;
      const weekLabel = sess.week ? ` · Week ${sess.week}` : '';
      html += `<button class="session-btn" onclick="showDetail('session',DATA.sessions.find(x=>x.date==='${sess.date}'&&x.workout==='${sess.workout}'))">
        <div style="width:8px;height:8px;border-radius:2px;background:${wc(sess.workout)};flex-shrink:0"></div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:${wc(sess.workout)}">${esc(sess.workout)}</div><div style="font-size:11px;color:var(--dim)">${fmtFull(sess.date)}${weekLabel}</div></div>
        <span style="font-size:11px;color:var(--dim)">${sc2} sets</span>
        <span style="color:var(--border)">›</span>
      </button>`;
    }
  }
  return html;
}

let calMonth = null, calYear = null;
function renderCalendar(meso) {
  const today = new Date().toISOString().split('T')[0];
  const now = new Date();
  if (calMonth === null) { calMonth = now.getMonth(); calYear = now.getFullYear(); }
  const sessMap = new Map();
  DATA.sessions.filter(s=>s.meso_id===meso.id).forEach(s => sessMap.set(s.date, s));
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthName = ['January','February','March','April','May','June','July','August','September','October','November','December'][calMonth];
  let html = `<div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}render()">‹</button>
      <span class="cal-month">${monthName} ${calYear}</span>
      <button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}render()">›</button>
    </div>
    <div class="cal-grid">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}`;
  for (let d=1; d<=daysInMonth; d++) {
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const s = sessMap.get(iso);
    const isToday = iso===today;
    const cls = `cal-day${s?' has-session':''}${isToday?' today':''}`;
    const bg = s ? wc(s.workout) : 'transparent';
    const click = s ? `onclick="showDetail('session',DATA.sessions.find(x=>x.date==='${iso}'&&x.workout==='${s.workout}'))"` : '';
    const label = s ? `<span class="cal-day-label">${s.workout.replace('Arms + Shoulders','Arms')}</span>` : '';
    html += `<button class="${cls}" style="background:${bg}" ${click}><span class="cal-day-num">${d}</span>${label}</button>`;
  }
  html += `</div>`;
  const usedWorkouts = new Set(DATA.sessions.filter(s=>s.meso_id===meso.id).map(s=>s.workout));
  html += `<div class="legend">${[...usedWorkouts].map(w=>`<div style="display:flex;align-items:center;gap:4px"><div class="legend-dot" style="background:${wc(w)}"></div><span class="legend-label">${w}</span></div>`).join('')}</div></div>`;
  return html;
}

function renderSessions() {
  if (DATA.sessions.length === 0) return `<div class="loading">No sessions yet</div>`;
  return DATA.sessions.map(sess => {
    const sc2 = DATA.sets.filter(s=>s.date===sess.date&&s.workout_name===sess.workout).length;
    const meso = getMeso(sess.meso_id);
    const weekLabel = sess.week ? ` · Week ${sess.week}` : '';
    return `<button class="session-btn" onclick="showDetail('session',DATA.sessions.find(x=>x.date==='${sess.date}'&&x.workout==='${sess.workout}'))">
      <div style="width:8px;height:8px;border-radius:2px;background:${wc(sess.workout)};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:${wc(sess.workout)}">${esc(sess.workout)}</div>
        <div style="font-size:11px;color:var(--dim)">${fmtFull(sess.date)}${meso?' · '+esc(meso.name):''}${weekLabel}</div>
      </div>
      <span style="font-size:11px;color:var(--dim)">${sc2} sets</span>
      <span style="color:var(--border)">›</span>
    </button>`;
  }).join('');
}

function renderSessionDetail(session) {
  const sets = DATA.sets.filter(s => s.date===session.date && s.workout_name===session.workout);
  const meso = getMeso(session.meso_id);
  const exerciseOrder = []; const seen = new Set();
  for (const s of sets) { const n = s.exercises?.name; if(n && !seen.has(n)){exerciseOrder.push(n);seen.add(n);} }
  const weekLabel = session.week ? ` · Week ${session.week}` : '';
  const mesoLink = meso ? ` · <button onclick="showDetail('meso',DATA.mesocycles.find(x=>x.id===${meso.id}))" style="background:none;border:none;font-family:inherit;font-size:12px;color:var(--upper-a);cursor:pointer;padding:0;font-weight:500">${esc(meso.name)}</button>` : '';
  let html = `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
    <div><span style="font-size:16px;font-weight:700;color:${wc(session.workout)}">${session.workout}</span><span style="font-size:12px;color:var(--muted);margin-left:8px">${fmt(session.date)}${mesoLink}${weekLabel}</span></div>
  </div>`;
  for (const exName of exerciseOrder) {
    const exSets = sets.filter(s=>s.exercises?.name===exName).sort((a,b)=>a.set_number-b.set_number);
    html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px">${esc(exName)}</div><div style="display:flex;flex-direction:column;gap:3px">${exSets.map(s=>setRow(s)).join('')}</div></div>`;
  }
  return html;
}

function renderExercises() {
  if (!window._exSearch) window._exSearch = '';
  if (!window._exFilter) window._exFilter = 'All';
  const setCounts = new Map();
  DATA.sets.forEach(s => { const n = s.exercises?.name; if(n) setCounts.set(n, (setCounts.get(n)||0)+1); });
  const muscles = ['All', ...new Set(DATA.exercises.map(e=>e.muscle_group).filter(Boolean))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
  let filtered = DATA.exercises.filter(e => {
    if (window._exFilter !== 'All' && e.muscle_group !== window._exFilter) return false;
    if (window._exSearch && !e.name.toLowerCase().includes(window._exSearch.toLowerCase())) return false;
    return true;
  }).map(e => ({...e, setCount: setCounts.get(e.name)||0}))
    .sort((a,b) => { if(a.setCount>0&&b.setCount===0) return -1; if(a.setCount===0&&b.setCount>0) return 1; if(a.setCount!==b.setCount) return b.setCount-a.setCount; return a.name.localeCompare(b.name); });
  let html = `<input class="search-input" type="text" placeholder="Search exercises…" value="${esc(window._exSearch)}" oninput="window._exSearch=this.value;render()">`;
  html += `<div class="muscle-pills">${muscles.map(m => `<button class="muscle-pill${window._exFilter===m?' active':''}" onclick="window._exFilter='${m}';render()">${m}</button>`).join('')}</div>`;
  if (filtered.length === 0) html += `<div style="padding:40px;text-align:center;color:var(--muted);font-size:12px">No exercises match</div>`;
  for (const ex of filtered) {
    html += `<button class="card" style="display:flex;align-items:center;gap:10px;padding:12px 14px;opacity:${ex.setCount===0?0.5:1}" onclick="showDetail('exercise',DATA.exercises.find(x=>x.id===${ex.id}))">
      <div class="exercise-bar" style="background:${mc(ex.muscle_group)}"></div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ex.name)}</div><div style="font-size:11px;color:var(--dim);margin-top:2px"><span style="color:${mc(ex.muscle_group)}">${ex.muscle_group||''}</span><span style="color:var(--border)"> · </span><span>${ex.equipment||''}</span></div></div>
      <span style="font-size:11px;color:var(--dim);background:var(--deep);padding:3px 8px;border-radius:8px">${ex.setCount} sets</span>
      <span style="color:var(--border)">›</span></button>`;
  }
  return html;
}

function renderExerciseDetail(exercise) {
  const sets = DATA.sets.filter(s => s.exercise_id === exercise.id);
  const bySession = new Map();
  for (const s of sets) {
    const key = `${s.date}|${s.workout_name}`;
    if (!bySession.has(key)) bySession.set(key, {date:s.date, workout:s.workout_name, sets:[]});
    bySession.get(key).sets.push(s);
  }
  const sessions = Array.from(bySession.values());
  sessions.forEach(s => s.sets.sort((a,b) => a.set_number - b.set_number));
  sessions.sort((a,b) => b.date.localeCompare(a.date));
  const totalSets = sets.length;
  const maxWt = sets.filter(s=>s.weight!=null).reduce((m,s)=>Math.max(m,s.weight),0);
  const best1RM = sets.filter(s=>s.weight!=null&&s.actual_reps).reduce((m,s)=>Math.max(m,s.weight*(1+s.actual_reps/30)),0);
  let html = `<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:700">${esc(exercise.name)}</h2><div style="display:flex;gap:8px;margin-top:6px"><span class="pill" style="background:${mc(exercise.muscle_group)}22;color:${mc(exercise.muscle_group)}">${exercise.muscle_group||''}</span><span class="pill" style="background:var(--deep);color:var(--dim)">${exercise.equipment||''}</span></div></div>`;
  if (totalSets > 0) {
    html += `<div class="stat-grid"><div class="stat-tile"><div class="stat-val">${totalSets}</div><div class="stat-label">Sets</div></div><div class="stat-tile"><div class="stat-val">${maxWt>0?maxWt:'—'}</div><div class="stat-sub">lbs</div><div class="stat-label">Top weight</div></div><div class="stat-tile"><div class="stat-val">${best1RM>0?Math.round(best1RM):'—'}</div><div class="stat-sub">lbs</div><div class="stat-label">Est 1RM</div></div></div>`;
  }
  if (sessions.length > 0) {
    html += `<h3 class="section-label">History (${sessions.length} sessions)</h3>`;
    for (const sess of sessions) {
      html += `<div style="margin-bottom:14px"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${fmtFull(sess.date)}</span><span style="font-size:11px;color:${wc(sess.workout)};font-weight:600">${sess.workout}</span><span style="flex:1"></span><span style="font-size:11px;color:var(--dim)">${sess.sets.length} sets</span></div><div style="display:flex;flex-direction:column;gap:3px">${sess.sets.map(s=>setRow(s)).join('')}</div></div>`;
    }
  }
  return html;
}

loadData();
</script>
</body>
</html>
