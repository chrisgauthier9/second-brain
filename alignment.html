<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Alignment – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151; --deep: #0f172a;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280;
      --accent: #7c3aed; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
      --hard-no: #f87171; --hard-no-bg: rgba(248,113,113,.08);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--accent); color: #fff; }

    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }

    .tabs { display: flex; gap: 4px; background: var(--deep); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px 0; border: none; border-radius: 8px;
      background: transparent; color: var(--dim); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; letter-spacing: .03em; }
    .tab.active { background: var(--card); color: var(--text); }

    /* === Day tab === */
    .day-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
    .day-title { font-size: 18px; font-weight: 700; }
    .day-sub { font-size: 12px; color: var(--dim); }
    .day-nav { display: flex; gap: 4px; }
    .day-nav button {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .day-nav button:hover { border-color: var(--accent); color: var(--text); }

    .save-status { font-size: 11px; color: var(--dim); height: 14px; margin-bottom: 10px; }
    .save-status.saving { color: var(--warn); }
    .save-status.saved  { color: var(--ok); }
    .save-status.error  { color: var(--err); }

    section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-bottom: 12px; }
    section.hard-nos { border-color: rgba(248,113,113,.3); background: var(--hard-no-bg); }
    section.hard-nos h2 { color: var(--hard-no); }

    .hours-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .hours-cell label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; font-weight: 500; }
    .hours-cell input {
      width: 100%; padding: 12px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 18px; font-weight: 600;
      text-align: center; outline: none;
    }
    .hours-cell input:focus { border-color: var(--accent); }

    .times-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .time-cell label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; font-weight: 500; }
    .time-cell input {
      width: 100%; padding: 10px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px;
      text-align: center; outline: none;
    }
    .time-cell input:focus { border-color: var(--accent); }

    .toggle-list { display: flex; flex-direction: column; gap: 8px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; user-select: none;
      transition: border-color .15s, background .15s;
    }
    .toggle-row:hover { border-color: var(--muted); }
    .toggle-row .label { font-size: 14px; font-weight: 500; }
    .toggle-row .switch {
      width: 44px; height: 24px; background: #2c3441; border-radius: 999px; position: relative;
      transition: background .2s; flex-shrink: 0;
    }
    .toggle-row .switch::after {
      content: ''; position: absolute; left: 3px; top: 3px; width: 18px; height: 18px;
      background: var(--muted); border-radius: 50%; transition: transform .2s, background .2s;
    }
    .toggle-row.on .switch { background: rgba(52,211,153,.3); }
    .toggle-row.on .switch::after { transform: translateX(20px); background: var(--ok); }
    section.hard-nos .toggle-row.broken { border-color: var(--hard-no); background: rgba(248,113,113,.12); }
    section.hard-nos .toggle-row.broken .switch { background: rgba(248,113,113,.3); }
    section.hard-nos .toggle-row.broken .switch::after { background: var(--hard-no); }

    .trained-cell {
      padding: 14px; background: var(--deep); border: 1px solid var(--border); border-radius: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .trained-cell .label { font-size: 14px; font-weight: 500; }
    .trained-cell .badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .trained-cell .badge.yes { background: rgba(52,211,153,.15); color: var(--ok); }
    .trained-cell .badge.no  { background: rgba(107,114,128,.15); color: var(--dim); }
    .trained-cell a { font-size: 12px; color: var(--accent); text-decoration: none; }

    textarea.notes {
      width: 100%; min-height: 100px; padding: 12px; background: var(--deep);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5;
      resize: vertical; outline: none;
    }
    textarea.notes:focus { border-color: var(--accent); }

    /* === History tab === */
    .history-controls { display: flex; gap: 6px; margin-bottom: 14px; }
    .range-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .heatmap-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; overflow-x: auto; }
    .heatmap-table { border-collapse: separate; border-spacing: 2px; font-size: 11px; min-width: 100%; }
    .heatmap-table th, .heatmap-table td { padding: 0; }
    .heatmap-table th.row-label {
      text-align: left; padding-right: 10px; color: var(--muted); font-weight: 500;
      font-size: 11px; white-space: nowrap; min-width: 110px;
    }
    .heatmap-table td.day-cell {
      width: 18px; height: 18px; border-radius: 3px; cursor: pointer;
      background: #2c3441; transition: transform .1s;
    }
    .heatmap-table td.day-cell:hover { transform: scale(1.3); outline: 1px solid var(--text); }
    .heatmap-table td.day-cell.hit  { background: var(--ok); }
    .heatmap-table td.day-cell.miss { background: var(--hard-no); }
    .heatmap-table td.day-cell.partial { background: var(--warn); }
    .heatmap-table td.day-cell.empty { background: #2c3441; opacity: .4; }
    .heatmap-table .col-header {
      font-size: 9px; color: var(--dim); writing-mode: vertical-rl; transform: rotate(180deg);
      height: 30px; padding: 0 1px;
    }

    .legend { display: flex; gap: 12px; margin-top: 10px; font-size: 10px; color: var(--dim); flex-wrap: wrap; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    .streaks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-top: 18px; }
    .streak-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .streak-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .streak-card .num { font-size: 20px; font-weight: 700; color: var(--ok); }
    .streak-card .num.zero { color: var(--dim); }
    .streak-card .sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* MOBILE tweaks */
    @media (max-width: 520px) {
      .heatmap-table th.row-label { min-width: 90px; font-size: 10px; }
      .heatmap-table td.day-cell { width: 14px; height: 14px; }
      h1 { font-size: 19px; }
      .day-title { font-size: 16px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="fitness.html">Fitness</a>
    <a href="journal.html">Journal</a>
    <a href="alignment.html" class="active">Alignment</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
</header>
<main>
  <h1>Alignment</h1>
  <div class="tabs">
    <button class="tab active" id="tab-day">Day</button>
    <button class="tab" id="tab-history">History</button>
  </div>
  <div id="view"><div class="loading">Loading…</div></div>
</main>

<script>
// ----- Config -----
const HARD_NOS = [
  { key: 'porn',                    label: 'Avoided porn' },
  { key: 'phone_to_kill_silence',   label: 'Avoided phone to kill silence' },
  { key: 'weed',                    label: 'No weed' },
];
const DEFAULTS = [
  { key: 'alcohol',                 label: 'No alcohol' },
  { key: 'social_media_before_9pm', label: 'No social media before 9pm' },
  { key: 'wind_down_by_10pm',       label: 'Wind down by 10pm' },
];
const MORNING = [
  { key: 'no_snooze',               label: 'No snooze' },
  { key: 'morning_walk',            label: 'Morning walk (10 min)' },
  { key: 'startup_sequence',        label: 'Startup sequence' },
];
const BODY = [
  { key: 'protein_hit',             label: 'Hit 180g protein' },
  { key: 'read_flourishing_self',   label: 'Read Flourishing Self' },
];
// Hard NO booleans in the DB are inverted: true = bad behavior happened.
const HARD_NO_INVERTED = new Set(['porn', 'phone_to_kill_silence', 'weed', 'alcohol', 'social_media_before_9pm']);
const HARD_NO_KEYS = new Set(['porn', 'phone_to_kill_silence', 'weed']);

// History heatmap rows
const HABIT_ROWS = [
  { key: 'porn',                    label: 'No porn',          inverted: true,  hardNo: true },
  { key: 'phone_to_kill_silence',   label: 'No phone silence', inverted: true,  hardNo: true },
  { key: 'weed',                    label: 'No weed',          inverted: true,  hardNo: true },
  { key: 'alcohol',                 label: 'No alcohol',       inverted: true },
  { key: 'social_media_before_9pm', label: 'No SM <9pm',       inverted: true },
  { key: 'wind_down_by_10pm',       label: 'Wind down 10pm',   inverted: false },
  { key: 'no_snooze',               label: 'No snooze',        inverted: false },
  { key: 'morning_walk',            label: 'Morning walk',     inverted: false },
  { key: 'startup_sequence',        label: 'Startup seq',      inverted: false },
  { key: 'protein_hit',             label: '180g protein',     inverted: false },
  { key: 'read_flourishing_self',   label: 'Read FS',          inverted: false },
  { key: 'trained',                 label: 'Trained',          inverted: false, derived: true },
];

// ----- State -----
let DATA = {};                              // date -> daily_checkins row (60d preloaded)
let TRAINED_DATES = new Set();              // dates with at least one session
let TAB = sessionStorage.getItem('alignTab') || 'day';
let CURRENT_DATE = todayISO();              // which day the Day tab is currently editing
let RANGE = 30;                             // history heatmap range

// ----- Date helpers -----
function todayISO() {
  const now = new Date();
  return new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function dateRange(daysBack) {
  const days = [];
  const today = new Date(todayISO() + 'T12:00:00');
  for (let i = 0; i < daysBack; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}
function fmtDayLabel(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function shiftDate(iso, delta) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return d.toISOString().split('T')[0];
}

// "habit hit?" — true/false/null. Null = unset.
function habitHit(row, h) {
  if (h.derived && h.key === 'trained') return TRAINED_DATES.has(row.date);
  const v = row?.[h.key];
  if (v == null) return null;
  return h.inverted ? !v : !!v;
}

// ----- Load -----
async function load() {
  await window._authReadyPromise;
  const cutoff = dateRange(60)[59];
  const [checkinsRes, sessRes] = await Promise.all([
    window.sb.from('daily_checkins').select('*').gte('date', cutoff).order('date', { ascending: false }),
    window.sb.from('sessions').select('date').gte('date', cutoff),
  ]);
  if (checkinsRes.error) {
    document.getElementById('view').innerHTML = `<div class="loading">Error: ${checkinsRes.error.message}</div>`;
    return;
  }
  DATA = {};
  for (const r of (checkinsRes.data || [])) DATA[r.date] = r;
  TRAINED_DATES = new Set((sessRes.data || []).map(s => s.date));
  render();
}

function render() {
  document.getElementById('tab-day').classList.toggle('active', TAB === 'day');
  document.getElementById('tab-history').classList.toggle('active', TAB === 'history');
  if (TAB === 'day') renderDay();
  else renderHistory();
}

// ----- Day tab — full editor -----
function renderDay() {
  const row = DATA[CURRENT_DATE] || { date: CURRENT_DATE };
  const trained = TRAINED_DATES.has(CURRENT_DATE);
  const isToday = CURRENT_DATE === todayISO();

  document.getElementById('view').innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-title">${fmtDayLabel(CURRENT_DATE)}${isToday ? ' <span style="color:var(--accent);font-size:13px">· today</span>' : ''}</div>
        <div class="day-sub">${CURRENT_DATE}</div>
      </div>
      <div class="day-nav">
        <button id="prev-day">← Prev</button>
        <button id="today-btn">Today</button>
        <button id="next-day">Next →</button>
      </div>
    </div>

    <div class="save-status" id="save-status"></div>

    <section>
      <h2>Hours</h2>
      <div class="hours-grid">
        <div class="hours-cell">
          <label>Hoot</label>
          <input type="number" step="0.25" min="0" max="24" data-col="hoot_hours" data-type="num" value="${fmtNum(row.hoot_hours)}" placeholder="0">
        </div>
        <div class="hours-cell">
          <label>Finnian</label>
          <input type="number" step="0.25" min="0" max="24" data-col="finnian_hours" data-type="num" value="${fmtNum(row.finnian_hours)}" placeholder="0">
        </div>
        <div class="hours-cell">
          <label>Tempo</label>
          <input type="number" step="0.25" min="0" max="24" data-col="tempo_hours" data-type="num" value="${fmtNum(row.tempo_hours)}" placeholder="0">
        </div>
      </div>
    </section>

    <section>
      <h2>Sleep & body</h2>
      <div class="times-row" style="margin-bottom:12px">
        <div class="time-cell">
          <label>Sleep</label>
          <input type="time" data-col="sleep_time" data-type="time" value="${fmtTime(row.sleep_time)}">
        </div>
        <div class="time-cell">
          <label>Wake</label>
          <input type="time" data-col="wake_time" data-type="time" value="${fmtTime(row.wake_time)}">
        </div>
        <div class="time-cell">
          <label>Last caffeine</label>
          <input type="time" data-col="last_caffeine" data-type="time" value="${fmtTime(row.last_caffeine)}">
        </div>
      </div>
      <div class="toggle-list">
        ${MORNING.concat(BODY).map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Trained</h2>
      <div class="trained-cell">
        <span class="label">${trained ? 'Session logged' : 'No session yet'}</span>
        ${trained
          ? '<span class="badge yes">✓ Trained</span>'
          : `<a href="fitness.html">Log a session →</a>`}
      </div>
    </section>

    <section class="hard-nos">
      <h2>Hard NOs</h2>
      <div class="toggle-list">
        ${HARD_NOS.map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Defaults</h2>
      <div class="toggle-list">
        ${DEFAULTS.map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Notes</h2>
      <textarea class="notes" data-col="notes" data-type="text" placeholder="What went down today?">${(row.notes || '').replace(/</g,'&lt;')}</textarea>
    </section>
  `;

  // Day nav
  document.getElementById('prev-day').addEventListener('click', () => { CURRENT_DATE = shiftDate(CURRENT_DATE, -1); render(); });
  document.getElementById('next-day').addEventListener('click', () => { CURRENT_DATE = shiftDate(CURRENT_DATE, 1); render(); });
  document.getElementById('today-btn').addEventListener('click', () => { CURRENT_DATE = todayISO(); render(); });

  // Inputs
  document.querySelectorAll('input[data-col], textarea[data-col]').forEach(input => {
    input.addEventListener('blur', () => saveCell(input));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.tagName !== 'TEXTAREA') input.blur();
    });
  });

  // Toggles
  document.querySelectorAll('.toggle-row').forEach(rowEl => {
    rowEl.addEventListener('click', () => {
      const col = rowEl.dataset.col;
      const inverted = HARD_NO_INVERTED.has(col);
      const currentlyOn = rowEl.classList.contains('on');
      const newOn = !currentlyOn;
      const dbVal = inverted ? !newOn : newOn;
      const r = DATA[CURRENT_DATE] || (DATA[CURRENT_DATE] = { date: CURRENT_DATE });
      r[col] = dbVal;
      // Update row class without full re-render so the toggle animates
      rowEl.classList.toggle('on', newOn);
      const isHardNo = HARD_NO_KEYS.has(col);
      rowEl.classList.toggle('broken', isHardNo && !newOn);
      saveValue(col, dbVal);
    });
  });
}

function toggleHTML(item, row) {
  const v = row?.[item.key];
  const inverted = HARD_NO_INVERTED.has(item.key);
  const on = v == null ? false : (inverted ? !v : !!v);
  const isHardNo = HARD_NO_KEYS.has(item.key);
  const broken = isHardNo && !on && v !== null && v !== undefined;
  return `<div class="toggle-row${on ? ' on' : ''}${broken ? ' broken' : ''}" data-col="${item.key}">
    <span class="label">${item.label}</span>
    <span class="switch"></span>
  </div>`;
}

function fmtNum(v) { return v != null ? Number(v).toFixed(2).replace(/\.?0+$/, '') : ''; }
function fmtTime(v) { return v ? String(v).slice(0,5) : ''; }

function setStatus(state, msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.className = 'save-status ' + state;
  el.textContent = msg;
}

async function saveCell(input) {
  const col = input.dataset.col;
  const type = input.dataset.type;
  const raw = input.value.trim();
  let value;
  if (raw === '') value = null;
  else if (type === 'num') {
    value = Number(raw);
    if (isNaN(value) || value < 0 || value > 24) { setStatus('error', 'Out of range'); return; }
  } else {
    value = raw;
  }
  const r = DATA[CURRENT_DATE] || (DATA[CURRENT_DATE] = { date: CURRENT_DATE });
  r[col] = value;
  await saveValue(col, value);
}

async function saveValue(col, value) {
  setStatus('saving', 'Saving…');
  const payload = { date: CURRENT_DATE, [col]: value };
  const { error } = await window.sb.from('daily_checkins').upsert(payload, { onConflict: 'date' });
  if (error) {
    setStatus('error', 'Save failed: ' + error.message);
    return;
  }
  setStatus('saved', 'Saved');
  setTimeout(() => { const el = document.getElementById('save-status'); if (el && el.classList.contains('saved')) el.textContent = ''; }, 1200);
}

// ----- History tab -----
function renderHistory() {
  const days = dateRange(RANGE).reverse();
  const rows = HABIT_ROWS;

  function streakFor(h) {
    let n = 0;
    for (const d of dateRange(60)) {
      const r = DATA[d] || { date: d };
      const hit = habitHit(r, h);
      if (hit === true) n++;
      else if (hit === false) break;
      else break;
    }
    return n;
  }

  const headerRow = `<tr><th class="row-label"></th>${days.map(d => {
    const dt = new Date(d + 'T12:00:00');
    const isFirstOfMonth = dt.getDate() === 1;
    const lbl = isFirstOfMonth ? dt.toLocaleDateString('en', { month: 'short' }) + ' ' + dt.getDate() : dt.getDate();
    return `<th class="col-header">${lbl}</th>`;
  }).join('')}</tr>`;

  const bodyRows = rows.map(h => {
    const cells = days.map(d => {
      const row = DATA[d] || { date: d };
      const hit = habitHit(row, h);
      let cls = 'empty';
      if (hit === true) cls = 'hit';
      else if (hit === false) cls = (h.hardNo ? 'miss' : 'partial');
      return `<td class="day-cell ${cls}" data-date="${d}" title="${fmtDayLabel(d)} — ${h.label}: ${hit === true ? 'hit' : hit === false ? 'missed' : 'no data'}"></td>`;
    }).join('');
    return `<tr><th class="row-label">${h.label}</th>${cells}</tr>`;
  }).join('');

  const streakCards = HABIT_ROWS.filter(h => h.hardNo || h.key === 'trained' || h.key === 'read_flourishing_self').map(h => {
    const n = streakFor(h);
    return `<div class="streak-card">
      <div class="label">${h.label}</div>
      <div class="num ${n === 0 ? 'zero' : ''}">${n}</div>
      <div class="sub">day${n === 1 ? '' : 's'}</div>
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <div class="history-controls">
      <button class="range-btn ${RANGE===7?'active':''}" data-range="7">7d</button>
      <button class="range-btn ${RANGE===30?'active':''}" data-range="30">30d</button>
      <button class="range-btn ${RANGE===60?'active':''}" data-range="60">60d</button>
    </div>

    <div class="heatmap-wrap">
      <table class="heatmap-table">
        <thead>${headerRow}</thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--ok)"></span>Hit</span>
      <span><span class="legend-dot" style="background:var(--hard-no)"></span>Hard NO broken</span>
      <span><span class="legend-dot" style="background:var(--warn)"></span>Default missed</span>
      <span><span class="legend-dot" style="background:#2c3441"></span>No data</span>
    </div>

    <h2 style="font-size:11px;color:var(--dim);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.08em">Streaks</h2>
    <div class="streaks-grid">${streakCards}</div>
  `;

  document.querySelectorAll('.range-btn').forEach(b => {
    b.addEventListener('click', () => { RANGE = Number(b.dataset.range); render(); });
  });
  document.querySelectorAll('.day-cell').forEach(c => {
    c.addEventListener('click', () => {
      CURRENT_DATE = c.dataset.date;
      TAB = 'day';
      sessionStorage.setItem('alignTab', 'day');
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

document.getElementById('tab-day').addEventListener('click', () => { TAB = 'day'; sessionStorage.setItem('alignTab','day'); render(); });
document.getElementById('tab-history').addEventListener('click', () => { TAB = 'history'; sessionStorage.setItem('alignTab','history'); render(); });

load();
</script>
</body>
</html>
