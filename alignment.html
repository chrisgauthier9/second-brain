<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Alignment – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151; --deep: #0f172a;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280;
      --accent: #7c3aed; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
      --hard-no: #f87171; --hard-no-bg: rgba(248,113,113,.08);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
    header { background: var(--card, #1f2937); border-bottom: 1px solid var(--border, #374151); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; padding-top: max(12px, env(safe-area-inset-top)); }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--accent); color: #fff; }

    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }

    .tabs { display: flex; gap: 4px; background: var(--deep); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px 0; border: none; border-radius: 8px;
      background: transparent; color: var(--dim); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; letter-spacing: .03em; }
    .tab.active { background: var(--card); color: var(--text); }

    /* === Day tab === */
    .day-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
    .day-title { font-size: 18px; font-weight: 700; }
    .day-sub { font-size: 12px; color: var(--dim); }
    .day-nav { display: flex; gap: 4px; }
    .day-nav button {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .day-nav button:hover { border-color: var(--accent); color: var(--text); }

    .save-status { font-size: 11px; color: var(--dim); min-height: 14px; margin-bottom: 10px; line-height: 14px; }
    .save-status:empty { display: none; }
    .save-status.saving { color: var(--warn); }
    .save-status.saved  { color: var(--ok); }
    .save-status.error  { color: var(--err); }

    section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-bottom: 12px; }
    section.hard-nos { border-color: rgba(248,113,113,.3); background: var(--hard-no-bg); }
    section.hard-nos h2 { color: var(--hard-no); }

    .hours-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .hours-cell label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; font-weight: 500; }
    .hours-cell input {
      width: 100%; padding: 12px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 18px; font-weight: 600;
      text-align: center; outline: none;
    }
    .hours-cell input:focus { border-color: var(--accent); }

    .times-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .times-row.times-4 { grid-template-columns: repeat(4, 1fr); }
    .times-row.times-2 { grid-template-columns: repeat(2, 1fr); }
    .time-cell { min-width: 0; }
    .time-cell label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; font-weight: 500; }
    .time-cell input {
      width: 100%; min-width: 0; min-height: 42px; padding: 10px 12px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; box-sizing: border-box; -webkit-appearance: none; appearance: none;
      line-height: 1.2;
    }
    .time-cell input:focus { border-color: var(--accent); }

    .toggle-list { display: flex; flex-direction: column; gap: 8px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 10px; user-select: none;
      transition: border-color .15s, background .15s;
      gap: 10px;
    }
    .toggle-row .label { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; }
    .yn-group {
      display: inline-flex; gap: 0; background: #2c3441;
      border-radius: 8px; padding: 2px; flex-shrink: 0; flex-wrap: wrap;
    }
    .yn-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 6px 14px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--dim); border-radius: 6px;
      transition: background .15s, color .15s;
      min-width: 44px; white-space: nowrap;
    }
    .yn-btn:hover { color: var(--text); }
    .yn-btn.active.yes { background: var(--ok); color: #0f1d18; }
    .yn-btn.active.no  { background: var(--dim); color: var(--text); }
    .yn-btn.active.untracked { background: #475569; color: var(--text); }
    section.hard-nos .toggle-row.broken { border-color: var(--hard-no); background: rgba(248,113,113,.12); }
    section.hard-nos .toggle-row.broken .yn-btn.active.no { background: var(--hard-no); color: #fff; }

    .trained-cell {
      padding: 14px; background: var(--deep); border: 1px solid var(--border); border-radius: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .trained-cell .label { font-size: 14px; font-weight: 500; }
    .trained-cell .badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .trained-cell .badge.yes { background: rgba(52,211,153,.15); color: var(--ok); }
    .trained-cell .badge.no  { background: rgba(107,114,128,.15); color: var(--dim); }
    .trained-cell a { font-size: 12px; color: var(--accent); text-decoration: none; }

    textarea.notes {
      width: 100%; min-height: 100px; padding: 12px; background: var(--deep);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5;
      resize: vertical; outline: none;
    }
    textarea.notes:focus { border-color: var(--accent); }

    .journal-title {
      width: 100%; padding: 10px 12px; background: var(--deep);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 15px; font-weight: 600;
      margin-bottom: 8px; outline: none;
    }
    .journal-title:focus { border-color: var(--accent); }
    textarea.journal-body {
      width: 100%; min-height: 160px; padding: 12px; background: var(--deep);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'Lora', Georgia, serif; font-size: 14px; line-height: 1.65;
      resize: vertical; outline: none;
    }
    textarea.journal-body:focus { border-color: var(--accent); }

    /* === History tab === */
    .history-controls { display: flex; gap: 6px; margin-bottom: 14px; }
    .range-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .heatmap-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; overflow-x: auto; }
    .heatmap-table { border-collapse: separate; border-spacing: 2px; font-size: 11px; width: 100%; table-layout: fixed; }
    .heatmap-table th, .heatmap-table td { padding: 0; }
    .heatmap-table th.row-label {
      text-align: left; padding-right: 10px; color: var(--muted); font-weight: 500;
      font-size: 11px; white-space: nowrap; width: 110px;
      position: sticky; left: 0; background: var(--card); z-index: 2;
      box-shadow: 4px 0 0 var(--card);
    }
    .heatmap-table td.day-cell {
      height: 18px; border-radius: 3px; cursor: pointer;
      background: #2c3441; transition: transform .1s;
    }
    .heatmap-table td.day-cell:hover { outline: 1px solid var(--text); }
    .heatmap-table td.day-cell.hit  { background: var(--ok); }
    .heatmap-table td.day-cell.miss { background: var(--hard-no); }
    .heatmap-table td.day-cell.hardmiss {
      background: var(--hard-no);
      position: relative;
    }
    .heatmap-table td.day-cell.hardmiss::after {
      content: '✕';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; font-weight: 800; line-height: 1;
      pointer-events: none;
    }
    .heatmap-table td.day-cell.partial { background: var(--warn); }
    .heatmap-table td.day-cell.neutral { background: #3b5b7a; }
    .heatmap-table td.day-cell.empty { background: #2c3441; opacity: .4; }
    .heatmap-table .col-header {
      font-size: 9px; color: var(--dim); writing-mode: vertical-rl; transform: rotate(180deg);
      height: 30px; padding: 0 1px;
    }

    .legend { display: flex; gap: 12px; margin-top: 10px; font-size: 10px; color: var(--dim); flex-wrap: wrap; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    .streaks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-top: 18px; }
    .streak-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .streak-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .streak-card .num { font-size: 20px; font-weight: 700; color: var(--ok); }
    .streak-card .num.zero { color: var(--dim); }
    .streak-card .sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* MOBILE tweaks */
    @media (max-width: 520px) {
      .heatmap-table th.row-label { min-width: 90px; font-size: 10px; }
      .heatmap-table td.day-cell { height: 14px; }
      h1 { font-size: 19px; }
      .day-title { font-size: 16px; }
    }
    /* ===== Mobile hamburger ===== */
    .nav-toggle {
      display: none; background: transparent; border: none; cursor: pointer;
      padding: 6px 8px; margin-left: auto; color: var(--text, #f3f4f6);
    }
    .nav-toggle svg { display: block; width: 22px; height: 22px; }
    @media (max-width: 600px) {
      .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
      .nav-links {
        position: fixed; top: 49px; left: 0; right: 0; bottom: 0;
        background: #1f2937; border-bottom: 1px solid #374151;
        flex-direction: column; gap: 0; padding: 6px 0;
        margin-left: 0; align-items: stretch;
        max-height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s ease;
        z-index: 100;
      }
      .nav-links.open { max-height: calc(100vh - 49px); overflow-y: auto; padding: 6px 0; }
      .nav-links a { padding: 14px 24px; border-radius: 0; font-size: 15px; }
      header { position: sticky; top: 0; z-index: 101; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
</head>

  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">

    <a href="reset.html">Reset</a>

</header>
<main>
  <h1>Alignment</h1>
  <div class="tabs">
    <button class="tab active" id="tab-day">Day</button>
    <button class="tab" id="tab-history">History</button>
  </div>
  <div id="view"><div class="loading">Loading…</div></div>
</main>

<script>
// ----- Config -----
const HARD_NOS = [
  { key: 'no_porn',                    label: 'Avoided porn' },
  { key: 'no_phone_silence',   label: 'Avoided phone to kill silence' },
  { key: 'no_weed',                    label: 'No weed' },
];
const DEFAULTS = [
  { key: 'no_alcohol',                 label: 'No alcohol' },
  { key: 'no_social_before_9pm', label: 'No social media before 9pm' },
  { key: 'scheduled_tomorrow',      label: 'Scheduled tomorrow' },
];
const MORNING = [
  { key: 'no_snooze',               label: 'No snooze' },
  { key: 'morning_walk',            label: 'Morning walk (10 min)' },
  { key: 'startup_sequence',        label: 'Startup sequence' },
];
const BODY = [
  { key: 'read_flourishing_self',   label: 'Read Flourishing Self' },
];
// All booleans: true = good (rule held / habit done), false = bad.
const HARD_NO_KEYS = new Set(['no_porn', 'no_phone_silence', 'no_weed']);

// History heatmap rows
const HABIT_ROWS = [
  // Hours — minimum 1.0h each
  { key: 'hoot_hours',              label: 'Hoot',             derived: true, dtype: 'min', col: 'hoot_hours',    threshold: 0 },
  { key: 'finnian_hours',           label: 'Finnian',          derived: true, dtype: 'min', col: 'finnian_hours', threshold: 0 },
  { key: 'tempo_hours',             label: 'Tempo',            derived: true, dtype: 'min', col: 'tempo_hours',   threshold: 0 },
  // Sleep — bedtime ≤ 23:00, wake ≤ 07:30, sleep ≥ 8.5h, last_caffeine ≤ 15:00, wind_down ≤ 22:00
  { key: 'bedtime',                 label: 'Bed ≤11pm',        derived: true, dtype: 'time_max', col: 'bedtime',         threshold: '23:00', allowAfterMidnight: true },
  { key: 'wake_time',               label: 'Wake ≤7:30',       derived: true, dtype: 'time_max', col: 'wake_time',       threshold: '07:30' },
  { key: 'sleep_duration',          label: 'Sleep ≥8.5h',      derived: true, dtype: 'sleep_duration', threshold: 8.5 },
  { key: 'last_caffeine',           label: 'Caff ≤3pm',        derived: true, dtype: 'time_max', col: 'last_caffeine',   threshold: '15:00' },
  { key: 'wind_down_time',          label: 'Wind down ≤10pm',  derived: true, dtype: 'time_max', col: 'wind_down_time',  threshold: '22:00' },
  // Hard NOs
  { key: 'no_porn',                    label: 'No porn',          hardNo: true },
  { key: 'no_phone_silence',   label: 'No phone silence', hardNo: true },
  { key: 'no_weed',                    label: 'No weed',          hardNo: true },
  // Defaults (booleans)
  { key: 'no_alcohol',                 label: 'No alcohol' },
  { key: 'no_social_before_9pm', label: 'No SM <9pm' },
  // Morning + body
  { key: 'no_snooze',               label: 'No snooze' },
  { key: 'morning_walk',            label: 'Morning walk' },
  { key: 'startup_sequence',        label: 'Startup seq' },
  { key: 'calories',                label: 'Calories',         derived: true, dtype: 'min', col: 'calories',       threshold: 0 },
  { key: 'protein_grams',           label: 'Protein',          derived: true, dtype: 'min', col: 'protein_grams',  threshold: 0 },
  { key: 'read_flourishing_self',   label: 'Read FS' },
  // Trained — its own special rule (single skip OK, 2-in-a-row red)
  { key: 'scheduled_tomorrow',      label: 'Scheduled tmrw' },
  { key: 'trained',                 label: 'Trained',          inverted: false, derived: true, dtype: 'trained' },
  { key: 'journaled',               label: 'Journaled',        derived: true, dtype: 'journal' },
];

// ----- State -----
let DATA = {};                              // date -> daily_checkins row (60d preloaded)
let TRAINED_DATES = new Set();              // dates with at least one session
let JOURNALS = {};                          // date -> array of journal_entries rows (most recent first)
let TAB = sessionStorage.getItem('alignTab') || 'day';
let CURRENT_DATE = todayISO();              // which day the Day tab is currently editing
let WEIGHT_LOG = {};                        // date -> weight (lbs)
let RANGE = 7;                              // history heatmap range

// ----- Date helpers (all in America/Toronto) -----
const TZ = 'America/Toronto';
function todayISO() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(new Date());
}
function dateRange(daysBack) {
  const days = [];
  const today = new Date(todayISO() + 'T12:00:00');
  for (let i = 0; i < daysBack; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(d);
    const y = parts.find(p=>p.type==='year').value;
    const m = parts.find(p=>p.type==='month').value;
    const day = parts.find(p=>p.type==='day').value;
    days.push(`${y}-${m}-${day}`);
  }
  return days;
}
function fmtDayLabel(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function shiftDate(iso, delta) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(d);
}

// "habit hit?" — true/false/null. Null = unset / didn't track / N/A.
function habitHit(row, h) {
  // ----- Derived rows -----
  if (h.derived) {
    // Trained: special-cased at the cell level (single skip OK), so here just
    // report true if a session exists, null otherwise.
    if (h.dtype === 'journal' || h.key === 'journaled') {
      return (JOURNALS[row.date] && JOURNALS[row.date].length > 0) ? true : null;
    }
    if (h.dtype === 'trained' || h.key === 'trained') {
      return TRAINED_DATES.has(row.date) ? true : null;
    }
    // Minimum-value threshold (e.g. hours ≥ 1.0)
    if (h.dtype === 'min') {
      const v = row?.[h.col];
      if (v == null) return null;
      return v != null && Number(v) > h.threshold;
    }
    // Time must be no later than threshold ("HH:MM"). Times stored as "HH:MM:SS".
    if (h.dtype === 'time_max') {
      const v = row?.[h.col];
      if (v == null) return null;
      const [th, tm] = h.threshold.split(':').map(Number);
      const [vh, vm] = String(v).slice(0,5).split(':').map(Number);
      const tMin = th * 60 + tm;
      const vMin = vh * 60 + vm;
      // For bedtime: late-night times (e.g. 11:30 PM) and post-midnight times (12:30 AM)
      // both come from "yesterday going to bed." Treat anything between noon and 11:59 PM
      // as "evening of the previous day" — measured against threshold normally.
      // Anything 00:00-11:59 AM is "early morning after going to bed late" — always a miss
      // for bedtime, since threshold is 23:00 and you went to bed after midnight.
      if (h.allowAfterMidnight) {
        // bedtime 22:00 → hit; 00:30 → miss (you went to bed after midnight, past 23:00)
        // Express in minutes-from-noon to make comparison sensible:
        // <noon means after midnight ⇒ definitely past 23:00 of previous day ⇒ miss.
        if (vMin < 12 * 60) return false;
        return vMin <= tMin;
      }
      return vMin <= tMin;
    }
    // Sleep duration ≥ threshold hours
    if (h.dtype === 'sleep_duration') {
      const bed = row?.bedtime;
      const wake = row?.wake_time;
      if (!bed || !wake) return null;
      const [bh, bm] = String(bed).slice(0,5).split(':').map(Number);
      const [wh, wm] = String(wake).slice(0,5).split(':').map(Number);
      let bedMin = bh * 60 + bm;
      const wakeMin = wh * 60 + wm;
      let durationMin;
      if (bedMin > wakeMin) durationMin = (24*60 - bedMin) + wakeMin;
      else durationMin = wakeMin - bedMin;
      return (durationMin / 60) >= h.threshold;
    }
  }

  // ----- Direct boolean / text rows -----
  const v = row?.[h.key];
  if (v == null) return null;

  // no_snooze is text: 'yes' | 'no' | 'no_alarm'
  if (h.key === 'no_snooze') {
    if (v === 'yes') return true;
    if (v === 'no')  return false;
    return 'neutral'; // 'no_alarm' is intentional (e.g. weekend) — neither hit nor miss
  }
  return !!v;
}

// ----- Load -----
async function load() {
  const cutoff = dateRange(60)[59];

  // Core queries — page cannot render without these
  const [checkinsRes, sessRes, journalsRes] = await Promise.all([
    sb.from('daily_checkins').select('*').gte('date', cutoff).order('date', { ascending: false }),
    sb.from('sessions').select('date').gte('date', cutoff),
    sb.from('journal_entries').select('id, entry_date, title, body, source').gte('entry_date', cutoff).order('entry_date', { ascending: false }).order('id', { ascending: false }),
  ]);

  if (checkinsRes.error) {
    document.getElementById('view').innerHTML = `<div class="loading">Error: ${checkinsRes.error.message}</div>`;
    return;
  }

  DATA = {};
  for (const r of (checkinsRes.data || [])) DATA[r.date] = r;
  TRAINED_DATES = new Set((sessRes.data || []).map(s => s.date));
  JOURNALS = {};
  for (const j of (journalsRes.data || [])) {
    if (!JOURNALS[j.entry_date]) JOURNALS[j.entry_date] = [];
    JOURNALS[j.entry_date].push(j);
  }

  // Bodyweight is optional — don't let a failure here block the page
  WEIGHT_LOG = {};
  try {
    const weightRes = await sb.from('bodyweight_log').select('date, weight').gte('date', cutoff).order('date', { ascending: false });
    if (!weightRes.error) {
      for (const w of (weightRes.data || [])) WEIGHT_LOG[w.date] = w.weight;
    }
  } catch (e) { /* bodyweight unavailable — render without it */ }

  render();
}

function render() {
  document.getElementById('tab-day').classList.toggle('active', TAB === 'day');
  document.getElementById('tab-history').classList.toggle('active', TAB === 'history');
  if (TAB === 'day') renderDay();
  else renderHistory();
}

// ----- Day tab — full editor -----
function renderDay() {
  const row = DATA[CURRENT_DATE] || { date: CURRENT_DATE };
  const trained = TRAINED_DATES.has(CURRENT_DATE);
  const isToday = CURRENT_DATE === todayISO();

  document.getElementById('view').innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-title">${fmtDayLabel(CURRENT_DATE)}${isToday ? ' <span style="color:var(--accent);font-size:13px">· today</span>' : ''}</div>
      </div>
      <div class="day-nav">
        <button id="prev-day">← Prev</button>
        <button id="today-btn">Today</button>
        <button id="next-day">Next →</button>
      </div>
    </div>

    <div class="save-status" id="save-status"></div>

    <section>
      <h2>Hours</h2>
      <div class="hours-grid">
        <div class="hours-cell">
          <label>Hoot</label>
          <input type="number" step="0.25" min="0" max="24" data-col="hoot_hours" data-type="num" value="${fmtNum(row.hoot_hours)}" placeholder="0">
        </div>
        <div class="hours-cell">
          <label>Finnian</label>
          <input type="number" step="0.25" min="0" max="24" data-col="finnian_hours" data-type="num" value="${fmtNum(row.finnian_hours)}" placeholder="0">
        </div>
        <div class="hours-cell">
          <label>Tempo</label>
          <input type="number" step="0.25" min="0" max="24" data-col="tempo_hours" data-type="num" value="${fmtNum(row.tempo_hours)}" placeholder="0">
        </div>
      </div>
    </section>

    <section>
      <h2>Sleep & body</h2>
      <div class="times-row times-4">
        <div class="time-cell">
          <label>Bedtime</label>
          <input type="time" data-col="bedtime" data-type="time" value="${fmtTime(row.bedtime)}">
        </div>
        <div class="time-cell">
          <label>Wake</label>
          <input type="time" data-col="wake_time" data-type="time" value="${fmtTime(row.wake_time)}">
        </div>
        <div class="time-cell">
          <label>Last caffeine</label>
          <input type="time" data-col="last_caffeine" data-type="time" value="${fmtTime(row.last_caffeine)}">
        </div>
        <div class="time-cell">
          <label>Wind down</label>
          <input type="time" data-col="wind_down_time" data-type="time" value="${fmtTime(row.wind_down_time)}">
        </div>
      </div>
      <div id="sleep-duration" style="font-size:12px;color:var(--dim);margin:8px 0 12px;text-align:center">${sleepDurationLabel(row.bedtime, row.wake_time)}</div>
      <div class="times-row times-2" style="margin-bottom:12px">
        <div class="time-cell">
          <label>Calories</label>
          <input type="number" step="1" min="0" max="9999" data-col="calories" data-type="num-int" value="${row.calories != null ? row.calories : ''}" placeholder="—">
        </div>
        <div class="time-cell">
          <label>Protein (g)</label>
          <input type="number" step="1" min="0" max="999" data-col="protein_grams" data-type="num-int" value="${row.protein_grams != null ? row.protein_grams : ''}" placeholder="—">
        </div>
      </div>
      <div class="toggle-list">
        ${MORNING.concat(BODY).map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Fitness</h2>
      <div class="trained-cell">
        <span class="label">${trained ? 'Gym session logged' : 'No session yet'}</span>
        ${trained
          ? '<span class="badge yes">✓ Trained</span>'
          : `<a href="fitness.html">Log a session →</a>`}
      </div>
      <div class="time-row" style="margin-top:12px">
        <div class="time-cell">
          <label>Weight (lbs)</label>
          <input type="number" step="0.1" min="0" max="500" id="weight-input" data-col="weight_lbs" data-type="weight" value="${WEIGHT_LOG[CURRENT_DATE] != null ? WEIGHT_LOG[CURRENT_DATE] : ''}" placeholder="—" style="width:100%">
        </div>
      </div>
    </section>

    <section class="hard-nos">
      <h2>Hard NOs</h2>
      <div class="toggle-list">
        ${HARD_NOS.map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Defaults</h2>
      <div class="toggle-list">
        ${DEFAULTS.map(t => toggleHTML(t, row)).join('')}
      </div>
    </section>

    <section>
      <h2>Notes</h2>
      <textarea class="notes" data-col="notes" data-type="text" placeholder="What went down today?">${(row.notes || '').replace(/</g,'&lt;')}</textarea>
    </section>

    <section>
      <h2>Daily journal${(JOURNALS[CURRENT_DATE]||[]).length > 1 ? ` <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">· editing most recent of ${(JOURNALS[CURRENT_DATE]||[]).length}</span>` : ''}</h2>
      ${journalSectionHTML()}
    </section>
  `;

  // Day nav
  document.getElementById('prev-day').addEventListener('click', () => { CURRENT_DATE = shiftDate(CURRENT_DATE, -1); render(); });
  document.getElementById('next-day').addEventListener('click', () => { CURRENT_DATE = shiftDate(CURRENT_DATE, 1); render(); });
  document.getElementById('today-btn').addEventListener('click', () => { CURRENT_DATE = todayISO(); render(); });

  // Inputs
  document.querySelectorAll('input[data-col], textarea[data-col]').forEach(input => {
    input.addEventListener('blur', () => saveCell(input));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.tagName !== 'TEXTAREA') input.blur();
    });
  });

  // Journal title + body — save on blur
  document.querySelectorAll('[data-jfield]').forEach(el => {
    el.addEventListener('blur', () => {
      saveJournalField(el.dataset.jfield, el.value.trim());
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && el.tagName !== 'TEXTAREA') el.blur();
    });
  });

  // Toggles — yes/no segmented control. Tapping the active button clears to null.
  document.querySelectorAll('.toggle-row').forEach(rowEl => {
    const isTri = rowEl.dataset.tri === '1';
    rowEl.querySelectorAll('.yn-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const col = rowEl.dataset.col;
        const display = btn.dataset.display; // 'yes' | 'no' | 'untracked'
        const wasActive = btn.classList.contains('active');
        const newDisplay = wasActive ? null : display;

        let dbVal;
        if (isTri) {
          // no_snooze: store the display string directly
          dbVal = newDisplay;
        } else {
          // Standard yes/no: true = good, false = bad, no inversion
          if (newDisplay === 'yes') dbVal = true;
          else if (newDisplay === 'no') dbVal = false;
          else dbVal = null;
        }

        // Update visual state
        rowEl.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('active'));
        if (newDisplay) btn.classList.add('active');
        const isHardNo = HARD_NO_KEYS.has(col);
        rowEl.classList.toggle('broken', isHardNo && newDisplay === 'no');

        // Update local cache + persist
        const r = DATA[CURRENT_DATE] || (DATA[CURRENT_DATE] = { date: CURRENT_DATE });
        r[col] = dbVal;
        saveValue(col, dbVal);
      });
    });
  });
}

function toggleHTML(item, row) {
  // Special case: no_snooze can be 'yes' | 'no' | 'no_alarm' | null (e.g. weekends without alarm)
  if (item.key === 'no_snooze') {
    const v = row?.[item.key];
    return `<div class="toggle-row" data-col="${item.key}" data-tri="1">
      <span class="label">${item.label}</span>
      <div class="yn-group">
        <button class="yn-btn yes${v === 'yes' ? ' active' : ''}" data-display="yes">Yes</button>
        <button class="yn-btn no${v === 'no' ? ' active' : ''}" data-display="no">No</button>
        <button class="yn-btn untracked${v === 'no_alarm' ? ' active' : ''}" data-display="no_alarm">No alarm</button>
      </div>
    </div>`;
  }
  const v = row?.[item.key];
  const isHardNo = HARD_NO_KEYS.has(item.key);
  // true = good (yes), false = bad (no), null = unset
  let displayState = null;
  if (v === true)  displayState = 'yes';
  else if (v === false) displayState = 'no';
  const broken = isHardNo && displayState === 'no';

  return `<div class="toggle-row${broken ? ' broken' : ''}" data-col="${item.key}">
    <span class="label">${item.label}</span>
    <div class="yn-group">
      <button class="yn-btn yes${displayState === 'yes' ? ' active' : ''}" data-display="yes">Yes</button>
      <button class="yn-btn no${displayState === 'no' ? ' active' : ''}" data-display="no">No</button>
    </div>
  </div>`;
}

function fmtNum(v) { return v != null ? Number(v).toFixed(2).replace(/\.?0+$/, '') : ''; }
function fmtTime(v) { return v ? String(v).slice(0,5) : ''; }

function escAttr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function escText(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function journalSectionHTML() {
  const list = JOURNALS[CURRENT_DATE] || [];
  const entry = list[0]; // most recent (or undefined for new)
  const title = entry?.title || '';
  const body  = entry?.body  || '';
  return `
    <input class="journal-title" type="text" placeholder="Title (optional)" value="${escAttr(title)}" data-jfield="title">
    <textarea class="journal-body" placeholder="Today's entry…" data-jfield="body">${escText(body)}</textarea>
  `;
}

async function saveJournalField(field, value) {
  setStatus('saving', 'Saving…');
  const list = JOURNALS[CURRENT_DATE] || [];
  let entry = list[0];

  if (entry) {
    // UPDATE existing
    const patch = { [field]: value === '' ? null : value };
    const { data, error } = await sb
      .from('journal_entries')
      .update(patch)
      .eq('id', entry.id)
      .select('id, entry_date, title, body, source')
      .single();
    if (error) { setStatus('error', 'Save failed: ' + error.message); return; }
    JOURNALS[CURRENT_DATE][0] = data;
  } else {
    // INSERT new
    if (value === '' || value == null) {
      // Don't create an empty entry
      setStatus('saved', 'Saved');
      setTimeout(() => { const el = document.getElementById('save-status'); if (el && el.classList.contains('saved')) el.textContent = ''; }, 1200);
      return;
    }
    const payload = { entry_date: CURRENT_DATE, source: 'manual', [field]: value };
    const { data, error } = await sb
      .from('journal_entries')
      .insert(payload)
      .select('id, entry_date, title, body, source')
      .single();
    if (error) { setStatus('error', 'Save failed: ' + error.message); return; }
    JOURNALS[CURRENT_DATE] = [data, ...(JOURNALS[CURRENT_DATE] || [])];
  }
  setStatus('saved', 'Saved');
  setTimeout(() => { const el = document.getElementById('save-status'); if (el && el.classList.contains('saved')) el.textContent = ''; }, 1200);
}

function sleepDurationLabel(bedtime, wake) {
  if (!bedtime || !wake) return '&nbsp;';
  const [bh, bm] = String(bedtime).slice(0,5).split(':').map(Number);
  const [wh, wm] = String(wake).slice(0,5).split(':').map(Number);
  if ([bh, bm, wh, wm].some(n => Number.isNaN(n))) return '&nbsp;';
  // Bedtime treated as the night before the wake. If bedtime hour >= 12 (PM),
  // it falls before midnight; otherwise (after midnight), it's same morning.
  let bedMin = bh * 60 + bm;
  const wakeMin = wh * 60 + wm;
  // Convention: if bedtime is later than wake on the clock, assume it's PM the night before.
  let durationMin;
  if (bedMin > wakeMin) {
    durationMin = (24 * 60 - bedMin) + wakeMin;
  } else {
    durationMin = wakeMin - bedMin;
  }
  const hours = Math.floor(durationMin / 60);
  const mins = durationMin % 60;
  return `Slept ${hours}h${mins ? ' ' + mins + 'm' : ''}`;
}

function setStatus(state, msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.className = 'save-status ' + state;
  el.textContent = msg;
}

async function saveCell(input) {
  const col = input.dataset.col;
  const type = input.dataset.type;
  const raw = input.value.trim();
  let value;
  if (raw === '') value = null;
  else if (type === 'num') {
    value = Number(raw);
    if (isNaN(value) || value < 0 || value > 24) { setStatus('error', 'Out of range'); return; }
  } else if (type === 'num-int') {
    value = parseInt(raw, 10);
    if (isNaN(value) || value < 0) { setStatus('error', 'Out of range'); return; }
  } else {
    value = raw;
  }
  // Weight logs to bodyweight_log, not daily_checkins
  if (type === 'weight') {
    await saveWeight(value);
    return;
  }
  const r = DATA[CURRENT_DATE] || (DATA[CURRENT_DATE] = { date: CURRENT_DATE });
  r[col] = value;
  // Refresh sleep duration display if bedtime or wake changed
  if (col === 'bedtime' || col === 'wake_time') {
    const el = document.getElementById('sleep-duration');
    if (el) el.innerHTML = sleepDurationLabel(r.bedtime, r.wake_time);
  }
  await saveValue(col, value);
}

async function saveWeight(value) {
  setStatus('saving', 'Saving…');
  if (value === null) { setStatus('saved', 'Saved'); return; }
  const { error } = await sb.from('bodyweight_log').upsert(
    { date: CURRENT_DATE, weight: value },
    { onConflict: 'date' }
  );
  if (error) { setStatus('error', 'Save failed: ' + error.message); return; }
  WEIGHT_LOG[CURRENT_DATE] = value;
  setStatus('saved', 'Saved');
  setTimeout(() => { const el = document.getElementById('save-status'); if (el && el.classList.contains('saved')) el.textContent = ''; }, 1200);
}

async function saveValue(col, value) {
  setStatus('saving', 'Saving…');
  const payload = { date: CURRENT_DATE, [col]: value };
  const { error } = await sb.from('daily_checkins').upsert(payload, { onConflict: 'date' });
  if (error) {
    setStatus('error', 'Save failed: ' + error.message);
    return;
  }
  setStatus('saved', 'Saved');
  setTimeout(() => { const el = document.getElementById('save-status'); if (el && el.classList.contains('saved')) el.textContent = ''; }, 1200);
}

// ----- History tab -----
function renderHistory() {
  const days = dateRange(RANGE).reverse();
  const rows = HABIT_ROWS;

  const headerRow = `<tr><th class="row-label"></th>${days.map(d => {
    const dt = new Date(d + 'T12:00:00');
    const isFirstOfMonth = dt.getDate() === 1;
    const lbl = isFirstOfMonth ? dt.toLocaleDateString('en', { month: 'short' }) + ' ' + dt.getDate() : dt.getDate();
    return `<th class="col-header">${lbl}</th>`;
  }).join('')}</tr>`;

  const bodyRows = rows.map(h => {
    // Find the first day (chronologically) where this habit has any data.
    // For non-derived: first day with hit !== null. For trained: first day in TRAINED_DATES.
    let startedAtIdx = -1;
    for (let i = 0; i < days.length; i++) {
      const r = DATA[days[i]] || { date: days[i] };
      const hv = habitHit(r, h);
      if (hv !== null) { startedAtIdx = i; break; }
    }

    let prevMissed = false;
    const cells = days.map((d, i) => {
      const row = DATA[d] || { date: d };
      const hit = habitHit(row, h);
      let cls = 'empty';
      const hitLabel = hit === true ? 'hit' : hit === false ? 'missed' : hit === 'neutral' ? 'no alarm (neutral)' : 'no data';
      let title = `${fmtDayLabel(d)} — ${h.label}: ${hitLabel}`;

      if (h.hardNo) {
        // Hard NO: any explicit "no" is red WITH an X. Hit is green. Null is gray.
        if (hit === true) cls = 'hit';
        else if (hit === false) cls = 'hardmiss';
        // No streak logic.
      } else if (h.derived && (h.dtype === 'trained' || h.key === 'trained')) {
        // Trained: a single skip is fine (gray). Two skips in a row -> red.
        if (startedAtIdx === -1 || i < startedAtIdx) {
          cls = 'empty';
        } else if (hit === true) {
          cls = 'hit';
          prevMissed = false;
        } else {
          // No session today. Single miss = stay gray. Second consecutive = red.
          if (prevMissed) cls = 'miss';
          else cls = 'empty';
          prevMissed = true;
        }
      } else {
        // Non-Hard-NO: yellow on first miss-in-a-stretch, red on 2nd-consecutive.
        // Null = no data (gray), does not count as a miss or break a streak.
        // 'neutral' = intentional non-event (e.g. no alarm on weekend) — own color, doesn't affect miss streak.
        if (startedAtIdx === -1 || i < startedAtIdx) {
          cls = 'empty';
        } else if (hit === 'neutral') {
          cls = 'neutral';
          // Don't touch prevMissed — neutral is not a miss
        } else if (hit === true) {
          cls = 'hit';
          prevMissed = false;
        } else if (hit === false) {
          if (prevMissed) cls = 'miss'; // second consecutive
          else cls = 'partial';          // first
          prevMissed = true;
        } else {
          // hit === null: no data
          cls = 'empty';
          // Don't reset prevMissed — gaps don't break streaks
        }
      }

      // Reset chain across rows (handled by closing this map iteration).
      return `<td class="day-cell ${cls}" data-date="${d}" title="${title}"></td>`;
    }).join('');
    return `<tr><th class="row-label">${h.label}</th>${cells}</tr>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <div class="history-controls">
      <button class="range-btn ${RANGE===7?'active':''}" data-range="7">7d</button>
      <button class="range-btn ${RANGE===30?'active':''}" data-range="30">30d</button>
      <button class="range-btn ${RANGE===60?'active':''}" data-range="60">60d</button>
    </div>

    <div class="heatmap-wrap">
      <table class="heatmap-table">
        <thead>${headerRow}</thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--ok)"></span>Hit</span>
      <span><span class="legend-dot" style="background:var(--warn)"></span>First miss</span>
      <span><span class="legend-dot" style="background:var(--hard-no)"></span>2nd miss in a row</span>
      <span><span class="legend-dot" style="background:var(--hard-no);position:relative;color:#fff;text-align:center;line-height:10px;font-size:8px;font-weight:800">✕</span>Hard NO broken</span>
      <span><span class="legend-dot" style="background:#3b5b7a"></span>Neutral (no alarm)</span>
      <span><span class="legend-dot" style="background:#2c3441"></span>No data</span>
    </div>
  `;

  document.querySelectorAll('.range-btn').forEach(b => {
    b.addEventListener('click', () => { RANGE = Number(b.dataset.range); render(); });
  });
  document.querySelectorAll('.day-cell').forEach(c => {
    c.addEventListener('click', () => {
      CURRENT_DATE = c.dataset.date;
      TAB = 'day';
      sessionStorage.setItem('alignTab', 'day');
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

document.getElementById('tab-day').addEventListener('click', () => { TAB = 'day'; sessionStorage.setItem('alignTab','day'); render(); });
document.getElementById('tab-history').addEventListener('click', () => { TAB = 'history'; sessionStorage.setItem('alignTab','history'); render(); });

load();
</script>


<script>
(function () {
  var nav = document.querySelector('header .nav-links');
  var hdr = document.querySelector('header');
  if (!nav || !hdr || hdr.querySelector('.nav-toggle')) return;
  var btn = document.createElement('button');
  btn.className = 'nav-toggle';
  btn.setAttribute('aria-label', 'Open menu');
  btn.setAttribute('aria-expanded', 'false');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';
  hdr.insertBefore(btn, nav);
  function close() { nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.addEventListener('click', function(e) {
    if (!nav.classList.contains('open')) return;
    if (nav.contains(e.target) || btn.contains(e.target)) return;
    close();
  });
  nav.addEventListener('click', function(e) { if (e.target.tagName === 'A') close(); });
})();
</script>
