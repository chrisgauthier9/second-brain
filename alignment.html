<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Second Brain">
  <meta name="theme-color" content="#111827">
  <title>Alignment – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280; --deep: #0f172a;
      --accent: #7c3aed; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background .15s; white-space: nowrap; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--accent); color: #fff; }

    main { padding: 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
    .help { font-size: 11px; color: var(--dim); margin-bottom: 16px; }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: auto; max-height: calc(100vh - 180px); }
    table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { position: sticky; top: 0; z-index: 2; background: var(--deep); }
    th {
      padding: 10px 8px; text-align: left; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em; color: var(--dim);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    th.col-date { position: sticky; left: 0; background: var(--deep); z-index: 3; }
    td { padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid #1a2332; vertical-align: middle; }
    td.col-date {
      position: sticky; left: 0; background: var(--card); z-index: 1;
      padding: 6px 10px; white-space: nowrap; font-weight: 500; color: var(--muted);
      border-right: 1px solid var(--border);
    }
    tr.today td.col-date { color: #a78bfa; font-weight: 600; }
    tr.today td { background: rgba(124,58,237,.05); }

    /* Cell inputs — minimal, fill the cell, change border on focus / save state */
    input.cell, .cell-checkbox-wrap {
      width: 100%; height: 32px; padding: 0 8px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 12px;
    }
    input.cell:focus { background: rgba(124,58,237,.15); }
    input.cell.num { text-align: right; min-width: 56px; }
    input.cell.time { min-width: 90px; }
    input.cell.text { min-width: 220px; }
    .cell-checkbox-wrap { display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .cell-checkbox-wrap input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
    .cell-derived {
      width: 100%; height: 32px; display: flex; align-items: center; justify-content: center;
      color: var(--ok); font-weight: 600;
    }

    /* Save state indicators on the row */
    tr.saving td.col-date::after { content: '·'; color: var(--warn); margin-left: 6px; font-size: 18px; line-height: 0; }
    tr.saved  td.col-date::after { content: '✓'; color: var(--ok);   margin-left: 6px; font-size: 11px; }
    tr.error  td.col-date::after { content: '!'; color: var(--err);  margin-left: 6px; font-size: 14px; font-weight: 700; }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="fitness.html">Fitness</a>
    <a href="journal.html">Journal</a>
    <a href="alignment.html" class="active">Alignment</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
</header>
<main>
  <h1>Alignment</h1>
  <div class="help">Click any cell to edit. Changes save automatically when you click off (or hit Enter / Tab).</div>
  <div id="app"><div class="loading">Loading…</div></div>
</main>

<script>
// Column definitions, in render order. type: 'num' | 'time' | 'bool' | 'text' | 'derived'
const COLS = [
  { key: 'hoot_hours',              label: 'Hoot (h)',     type: 'num' },
  { key: 'finnian_hours',           label: 'Finnian (h)',  type: 'num' },
  { key: 'tempo_hours',             label: 'Tempo (h)',    type: 'num' },
  { key: 'sleep_time',              label: 'Sleep',        type: 'time' },
  { key: 'wake_time',               label: 'Wake',         type: 'time' },
  { key: 'last_caffeine',           label: 'Last caffeine',type: 'time' },
  { key: 'trained',                 label: 'Trained',      type: 'derived' },
  { key: 'read_flourishing_self',   label: 'Read FS',      type: 'bool' },
  { key: 'morning_walk',            label: 'Walk',         type: 'bool' },
  { key: 'no_snooze',               label: 'No snooze',    type: 'bool' },
  { key: 'startup_sequence',        label: 'Startup seq',  type: 'bool' },
  { key: 'wind_down_by_10pm',       label: 'Wind down 10', type: 'bool' },
  { key: 'protein_hit',             label: 'Protein',      type: 'bool' },
  { key: 'porn',                    label: 'Porn',         type: 'bool' },
  { key: 'phone_to_kill_silence',   label: 'Phone silence',type: 'bool' },
  { key: 'weed',                    label: 'Weed',         type: 'bool' },
  { key: 'alcohol',                 label: 'Alcohol',      type: 'bool' },
  { key: 'social_media_before_9pm', label: 'SM <9pm',      type: 'bool' },
  { key: 'notes',                   label: 'Notes',        type: 'text' },
];
const DAYS_BACK = 60;

function todayISO() {
  const now = new Date();
  return new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function dateRange(daysBack) {
  const days = [];
  const today = new Date(todayISO() + 'T12:00:00');
  for (let i = 0; i < daysBack; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}
function fmtDateLabel(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
}

let DATA = {};
let TRAINED_DATES = new Set();

function cellHTML(col, row) {
  if (col.type === 'derived' && col.key === 'trained') {
    const trained = TRAINED_DATES.has(row.date);
    return `<div class="cell-derived" title="${trained ? 'Session logged on this date' : 'No session logged'}">${trained ? '✓' : '<span style="color:var(--dim)">–</span>'}</div>`;
  }
  const v = row?.[col.key];
  if (col.type === 'bool') {
    const checked = v === true ? 'checked' : '';
    return `<label class="cell-checkbox-wrap"><input type="checkbox" data-date="${row.date}" data-col="${col.key}" data-type="bool" ${checked}></label>`;
  }
  if (col.type === 'num') {
    const val = v != null ? Number(v).toFixed(2).replace(/\.?0+$/, '') : '';
    return `<input class="cell num" type="number" step="0.25" min="0" max="24" value="${val}" data-date="${row.date}" data-col="${col.key}" data-type="num" placeholder="–">`;
  }
  if (col.type === 'time') {
    const val = v ? String(v).slice(0,5) : '';
    return `<input class="cell time" type="time" value="${val}" data-date="${row.date}" data-col="${col.key}" data-type="time">`;
  }
  // text
  const val = (v ?? '').replace(/"/g, '&quot;');
  return `<input class="cell text" type="text" value="${val}" data-date="${row.date}" data-col="${col.key}" data-type="text" placeholder="–">`;
}

function render() {
  const today = todayISO();
  const dates = dateRange(DAYS_BACK);

  const headRow = '<tr><th class="col-date">Date</th>' +
    COLS.map(c => `<th>${c.label}</th>`).join('') +
    '</tr>';

  const bodyRows = dates.map(date => {
    const row = DATA[date] || { date };
    const isToday = date === today;
    const cells = COLS.map(c => `<td>${cellHTML(c, row)}</td>`).join('');
    return `<tr data-date="${date}"${isToday ? ' class="today"' : ''}>
      <td class="col-date">${fmtDateLabel(date)}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>${headRow}</thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
  `;

  // Wire up handlers
  document.querySelectorAll('input[data-col]').forEach(input => {
    if (input.type === 'checkbox') {
      input.addEventListener('change', () => saveCell(input));
    } else {
      input.addEventListener('blur', () => saveCell(input));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
      });
    }
  });
}

function parseCellValue(input) {
  const t = input.dataset.type;
  if (t === 'bool') return input.checked;
  const raw = input.value.trim();
  if (raw === '') return null;
  if (t === 'num') {
    const n = Number(raw);
    if (isNaN(n) || n < 0 || n > 24) throw new Error('out of range');
    return n;
  }
  if (t === 'time') return raw; // 'HH:MM'
  return raw; // text
}

async function saveCell(input) {
  const date = input.dataset.date;
  const col  = input.dataset.col;
  const tr = document.querySelector(`tr[data-date="${date}"]`);

  let value;
  try { value = parseCellValue(input); }
  catch { tr.classList.add('error'); setTimeout(() => tr.classList.remove('error'), 1500); return; }

  // Optimistic local update
  if (!DATA[date]) DATA[date] = { date };
  DATA[date][col] = value;

  tr.classList.remove('saved','error'); tr.classList.add('saving');

  const payload = { date, [col]: value };
  const { error } = await window.sb
    .from('daily_checkins')
    .upsert(payload, { onConflict: 'date' });

  tr.classList.remove('saving');
  if (error) {
    tr.classList.add('error');
    console.error('save failed', error);
    return;
  }
  tr.classList.add('saved');
  setTimeout(() => tr.classList.remove('saved'), 1000);
}

async function load() {
  await window._authReadyPromise;
  const cutoff = dateRange(DAYS_BACK)[DAYS_BACK - 1];
  const [checkinsRes, sessionsRes] = await Promise.all([
    window.sb.from('daily_checkins').select('*').gte('date', cutoff).order('date', { ascending: false }),
    window.sb.from('sessions').select('date').gte('date', cutoff),
  ]);

  if (checkinsRes.error) {
    document.getElementById('app').innerHTML = `<div class="loading">Error: ${checkinsRes.error.message}</div>`;
    return;
  }
  DATA = {};
  for (const row of (checkinsRes.data || [])) DATA[row.date] = row;
  TRAINED_DATES = new Set((sessionsRes.data || []).map(s => s.date));
  render();
}

load();
</script>
</body>
</html>
