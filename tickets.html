<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Second Brain">
  <meta name="theme-color" content="#111827">
  <title>Tickets – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    header { background: #1f2937; border-bottom: 1px solid #374151; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: #9ca3af; text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background .15s; white-space: nowrap; }
    .nav-links a:hover { background: #374151; color: #f3f4f6; }
    .nav-links a.active { background: #7c3aed; color: #fff; }
    .nav-meta { font-size: 12px; color: #6b7280; white-space: nowrap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; font-size: 14px; }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color .15s; }
    .stat-card:hover, .stat-card.active { border-color: #6d28d9; }
    .stat-card .label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-card .count { font-size: 26px; font-weight: 700; }
    .count-in-progress { color: #a78bfa; } .count-todo { color: #60a5fa; } .count-blocked { color: #f87171; }
    .count-paused { color: #9ca3af; } .count-deferred { color: #6b7280; } .count-done { color: #34d399; }
    .count-canceled { color: #4b5563; } .count-total { color: #f3f4f6; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .search-box { flex: 1; min-width: 200px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 7px 12px; color: #f3f4f6; font-size: 13px; font-family: inherit; outline: none; }
    .search-box:focus { border-color: #7c3aed; }
    .search-box::placeholder { color: #6b7280; }
    select { background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 7px 10px; color: #f3f4f6; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; }
    select:focus { border-color: #7c3aed; }
    .btn-reset { background: #374151; border: none; border-radius: 8px; padding: 7px 14px; color: #9ca3af; font-size: 13px; font-family: inherit; cursor: pointer; }
    .btn-reset:hover { background: #4b5563; color: #f3f4f6; }
    .table-wrap { background: #1f2937; border: 1px solid #374151; border-radius: 10px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: #111827; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; border-bottom: 1px solid #374151; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { color: #f3f4f6; }
    th .sort-icon { margin-left: 4px; opacity: .5; }
    th.sorted .sort-icon { opacity: 1; color: #a78bfa; }
    td { padding: 10px 14px; border-bottom: 1px solid #1f2937; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr.data-row { cursor: pointer; transition: background .1s; }
    tr.data-row:hover { background: #263046; }
    tr.notes-row td { background: #161e2e; padding: 0; }
    .notes-content { padding: 10px 14px 12px 40px; font-size: 12px; color: #9ca3af; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge-purple  { background: rgba(139,92,246,.2);  color: #a78bfa; }
    .badge-blue    { background: rgba(96,165,250,.2);  color: #60a5fa; }
    .badge-red     { background: rgba(248,113,113,.2); color: #f87171; }
    .badge-gray    { background: rgba(156,163,175,.15);color: #9ca3af; }
    .badge-green   { background: rgba(52,211,153,.2);  color: #34d399; }
    .badge-yellow  { background: rgba(251,191,36,.2);  color: #fbbf24; }
    .badge-dark    { background: rgba(75,85,99,.3);    color: #6b7280; }
    .badge-orange  { background: rgba(251,146,60,.2);  color: #fb923c; }
    .task-text { font-size: 13px; color: #e5e7eb; line-height: 1.4; max-width: 500px; }
    .notes-indicator { display: inline-block; width: 6px; height: 6px; background: #6b7280; border-radius: 50%; margin-left: 6px; vertical-align: middle; }
    .date-cell { font-size: 12px; color: #6b7280; white-space: nowrap; }
    .empty, .loading { text-align: center; padding: 48px; color: #6b7280; }
    #row-count { font-size: 12px; color: #6b7280; margin-left: auto; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="fitness.html">Fitness</a>
    <a href="tickets.html" class="active">Tickets</a>
    <a href="balance.html">Balance</a>
    <a href="journal.html">Journal</a>
    <span class="nav-meta" id="last-updated"></span>
  </nav>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="Search tickets...">
    <select id="filter-status">
      <option value="">All statuses</option>
      <option value="In Progress" selected>In Progress</option>
      <option value="Todo">Todo</option>
      <option value="Blocked">Blocked</option>
      <option value="Paused">Paused</option>
      <option value="Deferred">Deferred</option>
      <option value="Done">Done</option>
      <option value="Canceled">Canceled</option>
      <option value="Manual Reset">Manual Reset</option>
    </select>
    <select id="filter-priority">
      <option value="">All priorities</option>
      <option value="Critical">Critical</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
    <select id="filter-category">
      <option value="">All categories</option>
      <option value="Feature">Feature</option>
      <option value="Infra">Infra</option>
      <option value="Launch">Launch</option>
      <option value="Security">Security</option>
      <option value="Tech Debt">Tech Debt</option>
      <option value="Cleanup">Cleanup</option>
      <option value="Social Media">Social Media</option>
    </select>
    <button class="btn-reset" id="btn-reset">Reset</button>
    <span id="row-count"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="task">Task <span class="sort-icon">↕</span></th>
          <th data-col="status">Status <span class="sort-icon">↕</span></th>
          <th data-col="priority">Priority <span class="sort-icon">↕</span></th>
          <th data-col="category">Category <span class="sort-icon">↕</span></th>
          <th data-col="created_at">Created <span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="loading">Loading tickets...</td></tr>
      </tbody>
    </table>
  </div>
</main>
<script>
const SUPABASE_URL = 'https://pkdbzoptboinysspnpjp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZGJ6b3B0Ym9pbnlzc3BucGpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjA0NjIsImV4cCI6MjA5MTMzNjQ2Mn0.ccbJRVXNfqmgXuH1J9vL8DgttCAFJ-36gulWpL6R_cQ';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let allTickets = [], sortCol = 'created_at', sortDir = 'desc', expandedIds = new Set();
const PRIORITY_ORDER = { Critical:0, High:1, Medium:2, Low:3, '':4 };
const STATUS_ORDER = { 'In Progress':0, Blocked:1, Todo:2, Paused:3, Deferred:4, 'Manual Reset':5, Done:6, Canceled:7 };
const STATUS_BADGE = { 'In Progress':'badge-purple','Todo':'badge-blue','Blocked':'badge-red','Paused':'badge-gray','Deferred':'badge-gray','Done':'badge-green','Canceled':'badge-dark','Manual Reset':'badge-yellow' };
const PRIORITY_BADGE = { Critical:'badge-red', High:'badge-orange', Medium:'badge-yellow', Low:'badge-gray' };
function badge(text, cls) { if (!text) return '<span class="date-cell">–</span>'; return `<span class="badge ${cls}">${text}</span>`; }
function fmt(iso) { if (!iso) return '–'; return new Date(iso).toLocaleDateString('en-CA'); }
function renderStats(tickets) {
  const counts = {};
  for (const t of tickets) counts[t.status] = (counts[t.status]||0)+1;
  const stats = [
    {key:'In Progress',label:'In Progress',cls:'count-in-progress'},{key:'Todo',label:'Todo',cls:'count-todo'},
    {key:'Blocked',label:'Blocked',cls:'count-blocked'},{key:'Paused',label:'Paused',cls:'count-paused'},
    {key:'Deferred',label:'Deferred',cls:'count-deferred'},{key:'Done',label:'Done',cls:'count-done'},
    {key:'Canceled',label:'Canceled',cls:'count-canceled'},{key:'total',label:'Total',cls:'count-total'},
  ];
  document.getElementById('stats').innerHTML = stats.map(s => {
    const n = s.key==='total' ? tickets.length : (counts[s.key]||0);
    const isActive = s.key!=='total' && document.getElementById('filter-status').value===s.key;
    return `<div class="stat-card${isActive?' active':''}" data-status="${s.key}" onclick="filterByStatus('${s.key}')"><div class="label">${s.label}</div><div class="count ${s.cls}">${n}</div></div>`;
  }).join('');
}
function filterByStatus(status) {
  const sel = document.getElementById('filter-status');
  sel.value = (sel.value===status||status==='total') ? '' : status;
  render();
}
function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const priority = document.getElementById('filter-priority').value;
  const category = document.getElementById('filter-category').value;
  return allTickets.filter(t => {
    if (search && !t.task.toLowerCase().includes(search) && !(t.notes||'').toLowerCase().includes(search)) return false;
    if (status && t.status!==status) return false;
    if (priority && t.priority!==priority) return false;
    if (category && t.category!==category) return false;
    return true;
  });
}
function getSorted(tickets) {
  return [...tickets].sort((a,b) => {
    let va=a[sortCol], vb=b[sortCol];
    if (sortCol==='priority') { va=PRIORITY_ORDER[va??'']; vb=PRIORITY_ORDER[vb??'']; }
    else if (sortCol==='status') { va=STATUS_ORDER[va]??99; vb=STATUS_ORDER[vb]??99; }
    else { va=va??''; vb=vb??''; }
    const cmp = typeof va==='number' ? va-vb : String(va).localeCompare(String(vb));
    return sortDir==='asc' ? cmp : -cmp;
  });
}
function render() {
  const filtered = getSorted(getFiltered());
  document.getElementById('row-count').textContent = `${filtered.length} ticket${filtered.length!==1?'s':''}`;
  document.querySelectorAll('.stat-card').forEach(el => { el.classList.toggle('active', el.dataset.status!=='total' && document.getElementById('filter-status').value===el.dataset.status); });
  document.querySelectorAll('th[data-col]').forEach(th => {
    const col = th.dataset.col, icon = th.querySelector('.sort-icon');
    th.classList.toggle('sorted', col===sortCol);
    icon.textContent = col===sortCol ? (sortDir==='asc'?'↑':'↓') : '↕';
  });
  const tbody = document.getElementById('tbody');
  if (filtered.length===0) { tbody.innerHTML=`<tr><td colspan="5" class="empty">No tickets match your filters.</td></tr>`; return; }
  tbody.innerHTML = filtered.map(t => {
    const hasNotes = t.notes&&t.notes.trim();
    const expanded = expandedIds.has(t.id);
    const noteDot = hasNotes ? '<span class="notes-indicator" title="Has notes"></span>' : '';
    const notesRow = expanded&&hasNotes ? `<tr class="notes-row"><td colspan="5"><div class="notes-content">${escHtml(t.notes.trim())}</div></td></tr>` : '';
    return `<tr class="data-row" onclick="toggleExpand('${t.id}')"><td><span class="task-text">${escHtml(t.task)}${noteDot}</span></td><td>${badge(t.status,STATUS_BADGE[t.status]||'badge-gray')}</td><td>${badge(t.priority,PRIORITY_BADGE[t.priority]||'badge-gray')}</td><td>${t.category?`<span class="date-cell">${escHtml(t.category)}</span>`:'<span class="date-cell">–</span>'}</td><td><span class="date-cell">${fmt(t.created_at)}</span></td></tr>${notesRow}`;
  }).join('');
}
function toggleExpand(id) { if(expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id); render(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
    else { sortCol=col; sortDir=col==='created_at'?'desc':'asc'; }
    render();
  });
});
['search','filter-status','filter-priority','filter-category'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  ['search','filter-status','filter-priority','filter-category'].forEach(id => { document.getElementById(id).value=''; });
  render();
});
async function load() {
  const {data, error} = await client.from('tickets').select('id, task, status, priority, category, notes, created_at, completed_at').order('created_at', {ascending:false});
  if (error) { document.getElementById('tbody').innerHTML=`<tr><td colspan="5" class="empty">Error: ${error.message}</td></tr>`; return; }
  allTickets = data;
  document.getElementById('last-updated').textContent = `${data.length} tickets · refreshed ${new Date().toLocaleTimeString()}`;
  renderStats(data);
  render();
}
load();
</script>
</body>
</html>
