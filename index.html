<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --card: #111; --border: #1a1a1a; --text: #f5f5f5;
    --dim: #888; --muted: #555; --faint: #333; --deep: #222;
    --upper-a: #4FC3F7; --lower-a: #81C784; --upper-b: #CE93D8;
    --lower-b: #FFB74D; --arms: #F06292; --misc: #607D8B;
    --back: #4FC3F7; --biceps: #CE93D8; --calves: #90A4AE;
    --chest: #EF5350; --glutes: #FFB74D; --hamstrings: #FFF176;
    --quads: #81C784; --shoulders: #7986CB; --triceps: #F06292;
    --active: #81C784; --complete: #4FC3F7; --deload: #FFB74D; --planned: #90A4AE;
    --rpe-high: #EF5350; --rpe-mid: #FFB74D; --rpe-low: #81C784;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; }
  .wrap { max-width:500px; margin:0 auto; padding:16px 14px; }
  h1.logo { font-size:14px; font-weight:800; color:#444; text-transform:uppercase; letter-spacing:4px; text-align:center; margin-bottom:20px; }
  .tabs { display:flex; gap:4px; background:var(--card); border-radius:10px; padding:3px; margin-bottom:22px; }
  .tab { flex:1; padding:8px 0; border:none; border-radius:8px; background:transparent; color:var(--muted); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:0.5px; transition:all .15s; }
  .tab.active { background:var(--deep); color:var(--text); }
  .back-btn { background:none; border:none; color:var(--upper-a); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; padding:0; margin-bottom:14px; }
  .card { background:var(--card); border-radius:12px; padding:14px; margin-bottom:10px; border:none; width:100%; text-align:left; font-family:inherit; cursor:pointer; display:block; }
  .set-row { display:flex; align-items:center; gap:6px; padding:5px 10px; background:var(--card); border-radius:6px; font-size:13px; }
  .set-num { color:var(--muted); width:20px; font-weight:600; flex-shrink:0; }
  .set-wt { color:var(--text); font-weight:700; min-width:58px; }
  .set-reps { color:var(--dim); }
  .set-rpe { font-size:11px; font-weight:700; margin-left:auto; }
  .set-note { color:var(--muted); font-size:11px; font-style:italic; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill { font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; letter-spacing:0.5px; display:inline-block; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:22px; }
  .stat-tile { padding:10px 8px; background:var(--card); border-radius:10px; text-align:center; }
  .stat-val { font-size:20px; font-weight:800; color:var(--text); line-height:1; }
  .stat-val.sm { font-size:13px; }
  .stat-label { font-size:9px; color:#666; margin-top:6px; text-transform:uppercase; letter-spacing:0.8px; }
  .stat-sub { font-size:9px; color:#666; margin-top:2px; }
  .progress-bar { background:var(--border); border-radius:6px; height:6px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--upper-a),var(--lower-a)); border-radius:6px; }
  .section-label { font-size:12px; color:#666; text-transform:uppercase; letter-spacing:1.5px; font-weight:700; margin:0 0 12px; }
  .exercise-bar { width:4px; height:32px; border-radius:2px; flex-shrink:0; }
  .loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; border:1px solid var(--border); font-family:inherit; padding:0; cursor:default; background:transparent; }
  .cal-day.has-session { cursor:pointer; opacity:0.85; }
  .cal-day.today { border:1.5px solid var(--text); }
  .cal-day-num { font-size:12px; font-weight:500; color:#444; }
  .cal-day.has-session .cal-day-num { font-weight:800; color:#0a0a0a; }
  .cal-day-label { font-size:7px; font-weight:700; opacity:0.7; color:#0a0a0a; margin-top:-1px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 2px; }
  .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .cal-nav { background:var(--card); border:none; color:var(--dim); font-size:16px; width:32px; height:32px; border-radius:8px; cursor:pointer; font-family:inherit; }
  .cal-month { font-size:14px; font-weight:700; color:#ccc; letter-spacing:0.5px; }
  .cal-dow { text-align:center; font-size:10px; color:#444; font-weight:700; padding:2px 0; }
  .legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; justify-content:center; }
  .legend-dot { width:8px; height:8px; border-radius:2px; opacity:0.85; }
  .legend-label { font-size:9px; color:#666; }
  .search-input { width:100%; padding:10px 12px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; font-family:inherit; outline:none; box-sizing:border-box; margin-bottom:10px; }
  .muscle-pills { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; }
  .muscle-pills::-webkit-scrollbar { display:none; }
  .muscle-pill { padding:5px 10px; border-radius:14px; border:none; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:0.3px; white-space:nowrap; flex-shrink:0; }
  .session-btn { width:100%; display:flex; align-items:center; gap:10px; padding:10px 12px; background:#0f0f0f; border-radius:8px; border:1px solid #161616; cursor:pointer; margin-bottom:4px; font-family:inherit; text-align:left; }
  .group-btn { width:100%; display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--card); border:none; border-radius:8px; cursor:pointer; font-family:inherit; margin-bottom:8px; }
  .footer { text-align:center; color:var(--border); font-size:10px; margin-top:30px; letter-spacing:1px; }
  .workout-card { background:var(--card); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .notes-box { padding:10px 12px; background:#0f0f0f; border-radius:10px; border-left:2px solid var(--faint); margin-bottom:22px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading gym data...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://pkdbzoptboinysspnpjp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3AzsiWvSIyBQ876U61ahbQ_vQtkdO6J';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const workoutColors = {"Upper A":"var(--upper-a)","Lower A":"var(--lower-a)","Upper B":"var(--upper-b)","Lower B":"var(--lower-b)","Arms + Shoulders":"var(--arms)","Push A":"var(--misc)"};
const muscleColors = {Back:"var(--back)",Biceps:"var(--biceps)",Calves:"var(--calves)",Chest:"var(--chest)",Glutes:"var(--glutes)",Hamstrings:"var(--hamstrings)",Quads:"var(--quads)",Shoulders:"var(--shoulders)",Triceps:"var(--triceps)"};
const statusColors = {Active:"var(--active)",Complete:"var(--complete)",Deload:"var(--deload)",Planned:"var(--planned)"};

let DATA = { exercises:[], mesocycles:[], sessions:[], sets:[], templates:[] };
let STATE = { tab:'mesos', detail:null };

async function loadData() {
  const [exRes, mesoRes, setsRes, tmplRes] = await Promise.all([
    sb.from('exercises').select('*').order('name'),
    sb.from('mesocycles').select('*').order('start_date', {ascending:false}),
    sb.from('sets_log').select('*, exercises(name, muscle_group, equipment)').order('date').order('exercise_order').order('set_number'),
    sb.from('workout_templates').select('*, exercises(name, muscle_group)').order('mesocycle_id').order('exercise_order'),
  ]);
  DATA.exercises = exRes.data || [];
  DATA.mesocycles = mesoRes.data || [];
  DATA.sets = setsRes.data || [];
  DATA.templates = tmplRes.data || [];

  // Build sessions summary
  const sessMap = new Map();
  for (const s of DATA.sets) {
    const key = `${s.date}|${s.workout_name}`;
    if (!sessMap.has(key)) sessMap.set(key, { date:s.date, workout:s.workout_name, week:s.week, meso_id:s.mesocycle_id, sets:0 });
    sessMap.get(key).sets++;
  }
  DATA.sessions = Array.from(sessMap.values()).sort((a,b) => a.date.localeCompare(b.date));
  render();
}

function fmt(d) { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtFull(d) { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtShort(d) { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); }
function getMeso(id) { return DATA.mesocycles.find(m => m.id === id); }
function wc(w) { return workoutColors[w] || 'var(--misc)'; }
function mc(m) { return muscleColors[m] || '#888'; }
function rpeColor(r) { return r >= 9 ? 'var(--rpe-high)' : r >= 7 ? 'var(--rpe-mid)' : 'var(--rpe-low)'; }

function setRow(s) {
  const wt = s.weight != null ? `${s.weight} lbs` : '—';
  let extra = '';
  if (s.rpe != null) extra += `<span class="set-rpe" style="color:${rpeColor(s.rpe)}">RPE ${s.rpe}</span>`;
  if (s.notes) extra += `<span class="set-note" style="${s.rpe == null ? 'margin-left:auto' : 'margin-left:6px'}">${esc(s.notes)}</span>`;
  return `<div class="set-row"><span class="set-num">S${s.set_number}</span><span class="set-wt">${wt}</span><span class="set-reps">× ${s.actual_reps}</span>${extra}</div>`;
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  let html = `<h1 class="logo">Gym Tracker</h1>`;
  html += `<div class="tabs">`;
  for (const t of ['mesos','sessions','exercises']) {
    html += `<button class="tab ${STATE.tab===t?'active':''}" onclick="switchTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`;
  }
  html += `</div>`;

  if (STATE.detail) {
    html += `<button class="back-btn" onclick="back()">← Back</button>`;
    if (STATE.detail.type === 'meso') html += renderMesoDetail(STATE.detail.data);
    else if (STATE.detail.type === 'session') html += renderSessionDetail(STATE.detail.data);
    else if (STATE.detail.type === 'exercise') html += renderExerciseDetail(STATE.detail.data);
  } else {
    if (STATE.tab === 'mesos') html += renderMesos();
    else if (STATE.tab === 'sessions') html += renderSessions();
    else if (STATE.tab === 'exercises') html += renderExercises();
  }

  const totalSets = DATA.sessions.reduce((a,s) => a+s.sets, 0);
  html += `<p class="footer">LIVE · ${totalSets} SETS · ${DATA.sessions.length} SESSIONS · ${DATA.exercises.length} EXERCISES</p>`;
  app.innerHTML = html;
}

function switchTab(t) { STATE.tab = t; STATE.detail = null; render(); window.scrollTo(0,0); }
function back() { STATE.detail = null; render(); window.scrollTo(0,0); }
function showDetail(type, data) { STATE.detail = {type, data}; render(); window.scrollTo(0,0); }

// ── MESOS ──────────────────────────────────────────────────────
function renderMesos() {
  const sorted = [...DATA.mesocycles].sort((a,b) => {
    const o = {Active:0,Planned:1,Deload:2,Complete:3};
    return (o[a.status]??4) - (o[b.status]??4) || new Date(b.start_date) - new Date(a.start_date);
  });
  return sorted.map(m => {
    const sess = DATA.sessions.filter(s => s.meso_id === m.id);
    const totalSets = sess.reduce((a,s) => a+s.sets, 0);
    const start = new Date(m.start_date+'T12:00:00'), end = new Date(m.end_date+'T12:00:00');
    const pct = Math.min(100, Math.max(0, ((new Date()-start)/(end-start))*100));
    const wks = Math.ceil((end-start)/(7*864e5));
    return `<button class="card" onclick="showDetail('meso',DATA.mesocycles.find(x=>x.id===${m.id}))">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:16px;font-weight:800;color:var(--text)">${esc(m.name)}</span>
        <span class="pill" style="background:var(--border);color:${statusColors[m.status]||'var(--dim)'}">${m.status.toUpperCase()}</span>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:8px">${m.split_type||''} · ${wks} wks · ${fmtShort(m.start_date)} – ${fmtShort(m.end_date)}</div>
      <div class="progress-bar" style="height:4px;margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#666"><span>${sess.length} sessions</span><span>${totalSets} sets</span></div>
    </button>`;
  }).join('');
}

function renderMesoDetail(m) {
  const start = new Date(m.start_date+'T12:00:00'), end = new Date(m.end_date+'T12:00:00');
  const total = end-start, elapsed = Math.max(0,Math.min(total,new Date()-start));
  const pct = (elapsed/total)*100, wksTotal = Math.ceil(total/(7*864e5)), wksIn = Math.max(1,Math.ceil(elapsed/(7*864e5)));
  const sess = DATA.sessions.filter(s=>s.meso_id===m.id), totalSets = sess.reduce((a,s)=>a+s.sets,0);
  const templates = DATA.templates.filter(t=>t.mesocycle_id===m.id);
  const workouts = [...new Set(templates.map(t=>t.workout_name))];

  let html = `
    <div style="margin-bottom:22px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <h2 style="font-size:22px;font-weight:800;letter-spacing:-0.5px">${esc(m.name)}</h2>
        <span class="pill" style="background:var(--border);color:${statusColors[m.status]}">${m.status.toUpperCase()}</span>
      </div>
      <p style="font-size:12px;color:var(--dim);margin:4px 0 14px;line-height:1.5">${esc(m.goal||'')}</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px"><span>${fmtFull(m.start_date)}</span><span>Wk ${wksIn}/${wksTotal}</span><span>${fmtFull(m.end_date)}</span></div>
    </div>
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-val sm">${m.split_type||'—'}</div><div class="stat-label">Split</div></div>
      <div class="stat-tile"><div class="stat-val">${sess.length}</div><div class="stat-label">Sessions</div></div>
      <div class="stat-tile"><div class="stat-val">${totalSets}</div><div class="stat-label">Sets</div></div>
    </div>`;
  if (m.notes) html += `<div class="notes-box"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Notes</div><div style="font-size:12px;color:var(--dim);line-height:1.5">${esc(m.notes)}</div></div>`;
  html += `<h3 class="section-label">Workouts (${workouts.length})</h3>`;
  for (const wName of workouts) {
    const exs = templates.filter(t=>t.workout_name===wName).sort((a,b)=>a.exercise_order-b.exercise_order);
    html += `<div class="workout-card" style="border-left:3px solid ${wc(wName)}"><div style="font-size:14px;font-weight:700;color:${wc(wName)};margin-bottom:10px">${wName}</div>`;
    exs.forEach((ex,i) => {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;${i<exs.length-1?'border-bottom:1px solid #181818':''}">
        <span style="color:#444;width:18px;font-size:11px;flex-shrink:0">${ex.exercise_order}</span>
        <div style="flex:1;min-width:0"><div style="color:#e0e0e0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ex.exercises?.name||'')}</div><div style="font-size:10px;color:${mc(ex.exercises?.muscle_group)};margin-top:1px">${ex.exercises?.muscle_group||''}</div></div>
        <span style="color:#666;font-size:12px">${ex.prescribed_sets} × ${ex.rep_range_low}-${ex.rep_range_high}</span></div>`;
    });
    html += `</div>`;
  }
  return html;
}

// ── SESSIONS ───────────────────────────────────────────────────
function renderSessions() {
  let html = renderCalendar();
  // Group by meso
  const groups = new Map();
  for (const s of [...DATA.sessions].reverse()) {
    const key = s.meso_id ?? 'unassigned';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }
  for (const [key, items] of groups) {
    const meso = key === 'unassigned' ? null : getMeso(key);
    const totalSets = items.reduce((a,s)=>a+s.sets,0);
    const label = meso ? esc(meso.name) : 'Unassigned';
    const badge = meso?.status === 'Active' ? `<span class="pill" style="color:var(--active);background:#1a2a1a;font-size:9px;padding:1px 6px">ACTIVE</span>` : '';
    html += `<div style="margin-bottom:20px"><div class="group-btn"><span style="color:var(--muted);font-size:10px">▾</span><span style="font-size:12px;font-weight:700;color:${meso?'var(--text)':'var(--dim)'};text-transform:uppercase;letter-spacing:1px">${label}</span>${badge}<span style="flex:1"></span><span style="font-size:10px;color:var(--muted)">${items.length} sess · ${totalSets} sets</span></div>`;
    for (const s of items) {
      html += `<button class="session-btn" style="border-left:3px solid ${wc(s.workout)};opacity:${meso?1:0.6}" onclick="showDetail('session',DATA.sessions.find(x=>x.date==='${s.date}'&&x.workout==='${s.workout}'))">
        <div style="min-width:52px"><div style="font-size:13px;font-weight:700;color:#ccc">${fmt(s.date)}</div><div style="font-size:10px;color:var(--muted)">${s.week?'Wk '+s.week:'—'}</div></div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600;color:${wc(s.workout)}">${s.workout}</div></div>
        <span style="color:var(--dim);font-size:12px;margin-right:4px">${s.sets}</span><span style="color:var(--faint);font-size:16px">›</span></button>`;
    }
    html += `</div>`;
  }
  return html;
}

function renderCalendar() {
  if (!window._calMonth) window._calMonth = 0;
  const base = new Date(), y = new Date(base.getFullYear(), base.getMonth()+window._calMonth, 1).getFullYear(), mo = new Date(base.getFullYear(), base.getMonth()+window._calMonth, 1).getMonth();
  const monthName = new Date(y,mo,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const sessMap = new Map(); DATA.sessions.forEach(s => sessMap.set(s.date, s));
  const dow = new Date(y,mo,1).getDay(), dim = new Date(y,mo+1,0).getDate();
  const today = new Date().toISOString().slice(0,10);

  let html = `<div style="margin-bottom:22px"><div class="cal-header"><button class="cal-nav" onclick="window._calMonth--;render()">‹</button><span class="cal-month">${monthName}</span><button class="cal-nav" onclick="window._calMonth++;render()">›</button></div>`;
  html += `<div class="cal-grid" style="margin-bottom:4px">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div><div class="cal-grid">`;
  for (let i=0;i<dow;i++) html += `<div></div>`;
  for (let d=1;d<=dim;d++) {
    const iso = `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const s = sessMap.get(iso);
    const isToday = iso===today;
    const cls = `cal-day${s?' has-session':''}${isToday?' today':''}`;
    const bg = s ? wc(s.workout) : 'transparent';
    const click = s ? `onclick="showDetail('session',DATA.sessions.find(x=>x.date==='${iso}'&&x.workout==='${s.workout}'))"` : '';
    const label = s ? `<span class="cal-day-label">${s.workout.replace('Arms + Shoulders','Arms')}</span>` : '';
    html += `<button class="${cls}" style="background:${bg}" ${click}><span class="cal-day-num">${d}</span>${label}</button>`;
  }
  html += `</div>`;
  // Legend
  const usedWorkouts = new Set(DATA.sessions.map(s=>s.workout));
  html += `<div class="legend">${[...usedWorkouts].map(w=>`<div style="display:flex;align-items:center;gap:4px"><div class="legend-dot" style="background:${wc(w)}"></div><span class="legend-label">${w}</span></div>`).join('')}</div></div>`;
  return html;
}

function renderSessionDetail(session) {
  const sets = DATA.sets.filter(s => s.date===session.date && s.workout_name===session.workout);
  const meso = getMeso(session.meso_id);
  const exerciseOrder = []; const seen = new Set();
  for (const s of sets) { const n = s.exercises?.name; if(n && !seen.has(n)){exerciseOrder.push(n);seen.add(n);} }

  let html = `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--deep)"><div><span style="font-size:16px;font-weight:700;color:${wc(session.workout)}">${session.workout}</span><span style="font-size:12px;color:var(--muted);margin-left:8px">${fmt(session.date)} · ${meso?meso.name+' W'+session.week:'unassigned'}</span></div></div>`;
  for (const exName of exerciseOrder) {
    const exSets = sets.filter(s=>s.exercises?.name===exName).sort((a,b)=>a.set_number-b.set_number);
    html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#ddd;margin-bottom:4px">${esc(exName)}</div><div style="display:flex;flex-direction:column;gap:3px">${exSets.map(s=>setRow(s)).join('')}</div></div>`;
  }
  return html;
}

// ── EXERCISES ──────────────────────────────────────────────────
function renderExercises() {
  if (!window._exSearch) window._exSearch = '';
  if (!window._exFilter) window._exFilter = 'All';

  const setCounts = new Map();
  DATA.sets.forEach(s => { const n = s.exercises?.name; if(n) setCounts.set(n, (setCounts.get(n)||0)+1); });
  const muscles = ['All', ...new Set(DATA.exercises.map(e=>e.muscle_group).filter(Boolean))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));

  let filtered = DATA.exercises.filter(e => {
    if (window._exFilter !== 'All' && e.muscle_group !== window._exFilter) return false;
    if (window._exSearch && !e.name.toLowerCase().includes(window._exSearch.toLowerCase())) return false;
    return true;
  }).map(e => ({...e, setCount: setCounts.get(e.name)||0}))
    .sort((a,b) => { if(a.setCount>0&&b.setCount===0) return -1; if(a.setCount===0&&b.setCount>0) return 1; if(a.setCount!==b.setCount) return b.setCount-a.setCount; return a.name.localeCompare(b.name); });

  let html = `<input class="search-input" type="text" placeholder="Search exercises…" value="${esc(window._exSearch)}" oninput="window._exSearch=this.value;render()">`;
  html += `<div class="muscle-pills">${muscles.map(m => {
    const active = window._exFilter === m;
    const bg = active ? (m==='All'?'var(--faint)':mc(m)) : 'var(--card)';
    const col = active ? (m==='All'?'var(--text)':'#0a0a0a') : 'var(--dim)';
    return `<button class="muscle-pill" style="background:${bg};color:${col}" onclick="window._exFilter='${m}';render()">${m}</button>`;
  }).join('')}</div>`;

  if (filtered.length === 0) html += `<div style="padding:40px;text-align:center;color:var(--muted);font-size:12px">No exercises match</div>`;
  for (const ex of filtered) {
    html += `<button class="card" style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);opacity:${ex.setCount===0?0.5:1}" onclick="showDetail('exercise',DATA.exercises.find(x=>x.id===${ex.id}))">
      <div class="exercise-bar" style="background:${mc(ex.muscle_group)}"></div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ex.name)}</div><div style="font-size:10px;color:#666;margin-top:2px"><span style="color:${mc(ex.muscle_group)}">${ex.muscle_group||''}</span><span style="color:var(--faint)"> · </span><span>${ex.equipment||''}</span></div></div>
      <span style="font-size:11px;color:${ex.setCount>0?'var(--dim)':'#444'};font-weight:600;background:var(--border);padding:3px 8px;border-radius:10px">${ex.setCount} sets</span>
      <span style="color:var(--faint);font-size:14px">›</span></button>`;
  }
  return html;
}

function renderExerciseDetail(exercise) {
  const sets = DATA.sets.filter(s => s.exercise_id === exercise.id);
  const bySession = new Map();
  for (const s of sets) {
    const key = `${s.date}|${s.workout_name}`;
    if (!bySession.has(key)) bySession.set(key, {date:s.date, workout:s.workout_name, sets:[]});
    bySession.get(key).sets.push(s);
  }
  const sessions = Array.from(bySession.values());
  sessions.forEach(s => s.sets.sort((a,b) => a.set_number - b.set_number));
  sessions.sort((a,b) => b.date.localeCompare(a.date));

  const totalSets = sets.length;
  const maxWt = sets.filter(s=>s.weight!=null).reduce((m,s)=>Math.max(m,s.weight),0);
  const best1RM = sets.filter(s=>s.weight!=null&&s.actual_reps).reduce((m,s)=>Math.max(m,s.weight*(1+s.actual_reps/30)),0);

  let html = `<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;letter-spacing:-0.5px">${esc(exercise.name)}</h2><div style="display:flex;gap:8px;margin-top:6px"><span class="pill" style="background:var(--card);color:${mc(exercise.muscle_group)}">${exercise.muscle_group||''}</span><span class="pill" style="background:var(--card);color:var(--dim)">${exercise.equipment||''}</span></div></div>`;

  if (totalSets > 0) {
    html += `<div class="stat-grid"><div class="stat-tile"><div class="stat-val">${totalSets}</div><div class="stat-label">Sets</div></div><div class="stat-tile"><div class="stat-val">${maxWt>0?maxWt:'—'}</div><div class="stat-sub">lbs</div><div class="stat-label">Top weight</div></div><div class="stat-tile"><div class="stat-val">${best1RM>0?Math.round(best1RM):'—'}</div><div class="stat-sub">lbs</div><div class="stat-label">Est 1RM</div></div></div>`;
  } else {
    html += `<div style="padding:40px 20px;background:var(--card);border-radius:12px;text-align:center;margin-bottom:22px"><div style="font-size:13px;color:#666">No sets logged yet</div></div>`;
  }

  if (sessions.length > 0) {
    html += `<h3 class="section-label">History (${sessions.length} sessions)</h3>`;
    for (const sess of sessions) {
      html += `<div style="margin-bottom:14px"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;padding:0 4px"><span style="font-size:12px;color:#ccc;font-weight:700">${fmtFull(sess.date)}</span><span style="font-size:11px;color:${wc(sess.workout)};font-weight:600">${sess.workout}</span><span style="flex:1"></span><span style="font-size:10px;color:#444">${sess.sets.length} sets</span></div><div style="display:flex;flex-direction:column;gap:3px">${sess.sets.map(s=>setRow(s)).join('')}</div></div>`;
    }
  }
  return html;
}

// ── INIT ───────────────────────────────────────────────────────
loadData();
</script>
