<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Second Brain">
  <meta name="theme-color" content="#111827">
  <title>Balance – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    header { background: #1f2937; border-bottom: 1px solid #374151; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: #9ca3af; text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background .15s; white-space: nowrap; }
    .nav-links a:hover { background: #374151; color: #f3f4f6; }
    .nav-links a.active { background: #7c3aed; color: #fff; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; font-size: 14px; }
    main { max-width: 900px; margin: 0 auto; padding: 24px; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; margin-bottom: 12px; }

    .goal-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .goal-card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 16px 18px; }
    .goal-card .cat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .goal-card .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .goal-card .hours-big { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .goal-card .sub { font-size: 12px; color: #6b7280; margin-bottom: 10px; }
    .bar-track { background: #374151; border-radius: 4px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; margin-top: 10px; }
    .badge-ok { background: rgba(52,211,153,.15); color: #34d399; }
    .badge-miss { background: rgba(248,113,113,.15); color: #f87171; }
    .badge-partial { background: rgba(251,191,36,.15); color: #fbbf24; }

    .week-section { margin-bottom: 28px; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .day-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .day-label { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
    .day-bar-wrap { width: 100%; display: flex; flex-direction: column-reverse; gap: 2px; min-height: 66px; }
    .day-bar { border-radius: 3px; width: 100%; min-height: 4px; }
    .day-today .day-label { color: #a78bfa; font-weight: 600; }

    .log-section { }
    .log-wrap { background: #1f2937; border: 1px solid #374151; border-radius: 10px; overflow: hidden; }
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th { background: #111827; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; border-bottom: 1px solid #374151; }
    .log-table td { padding: 6px 12px; border-bottom: 1px solid #1f2937; font-size: 13px; }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table .today-row td { background: rgba(124,58,237,.08); }
    .log-table input.hours {
      width: 64px; padding: 6px 8px; background: #111827; border: 1px solid #374151;
      border-radius: 6px; color: #f3f4f6; font-family: inherit; font-size: 13px; text-align: right;
    }
    .log-table input.hours:focus { outline: none; border-color: #7c3aed; }
    .log-table input.hours.saving { border-color: #fbbf24; }
    .log-table input.hours.saved { border-color: #34d399; }
    .log-table input.hours.error { border-color: #f87171; }
    .empty { text-align: center; padding: 40px; color: #6b7280; font-size: 13px; }
    .loading { text-align: center; padding: 60px; color: #6b7280; }
    .cat-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    .hoot-color { color: #34d399; } .hoot-bg { background: #34d399; }
    .finnian-color { color: #60a5fa; } .finnian-bg { background: #60a5fa; }
    .tempo-color { color: #f472b6; } .tempo-bg { background: #f472b6; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="fitness.html">Fitness</a>
    <a href="balance.html" class="active">Balance</a>
    <a href="journal.html">Journal</a>
    <a href="alignment.html">Alignment</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
</header>
<main>
  <div id="app"><div class="loading">Loading balance data...</div></div>
</main>

<script>
const CATS = [
  { key: 'hoot',    col: 'hoot_hours',    label: 'Hoot',    cls: 'hoot' },
  { key: 'finnian', col: 'finnian_hours', label: 'Finnian', cls: 'finnian' },
  { key: 'tempo',   col: 'tempo_hours',   label: 'Tempo',   cls: 'tempo' },
];
const GOAL_HOURS = 1; // 1 hour minimum per project per day
const DAYS_BACK = 30;

function todayISO() {
  const now = new Date();
  return new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().split('T')[0];
}

function dateRange(daysBack) {
  const days = [];
  const today = new Date(todayISO() + 'T12:00:00');
  for (let i = 0; i < daysBack; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function getWeekDays() {
  // Last 7 days, oldest first
  const days = dateRange(7).reverse();
  return days;
}

function fmt(h) { return (h ?? 0).toFixed(1); }

let DATA = {}; // date -> {hoot_hours, finnian_hours, tempo_hours}

function render() {
  const today = todayISO();
  const weekDays = getWeekDays();
  const allDays = dateRange(DAYS_BACK);

  // Today + week aggregates
  const todayRow = DATA[today] || {};
  const weekTotals = { hoot: 0, finnian: 0, tempo: 0 };
  const weekDaysHit = { hoot: 0, finnian: 0, tempo: 0 };
  for (const d of weekDays) {
    const row = DATA[d] || {};
    for (const c of CATS) {
      const h = Number(row[c.col] || 0);
      weekTotals[c.key] += h;
      if (h >= GOAL_HOURS) weekDaysHit[c.key]++;
    }
  }

  // Goal cards
  const goalCards = CATS.map(c => {
    const todayH = Number(todayRow[c.col] || 0);
    const weekH = weekTotals[c.key];
    const pct = Math.min(100, Math.round((todayH / GOAL_HOURS) * 100));
    const met = todayH >= GOAL_HOURS;
    const badgeCls = met ? 'badge-ok' : todayH > 0 ? 'badge-partial' : 'badge-miss';
    const badgeLabel = met ? '✓ Goal met' : todayH > 0 ? `${(GOAL_HOURS - todayH).toFixed(1)}h to go` : 'Not started';
    return `<div class="goal-card">
      <div class="cat-label"><div class="dot ${c.cls}-bg"></div><span class="${c.cls}-color">${c.label}</span></div>
      <div class="hours-big ${c.cls}-color">${fmt(todayH)}h</div>
      <div class="sub">today · ${fmt(weekH)}h this week</div>
      <div class="bar-track"><div class="bar-fill ${c.cls}-bg" style="width:${pct}%"></div></div>
      <span class="status-badge ${badgeCls}">${badgeLabel}</span>
    </div>`;
  }).join('');

  // Week grid (stacked bars)
  const maxStack = 8; // hours; bar maxes out at this
  const weekGrid = weekDays.map(d => {
    const row = DATA[d] || {};
    const isToday = d === today;
    const dayName = new Date(d + 'T12:00:00').toLocaleDateString('en', { weekday: 'narrow' });
    const bars = CATS.map(c => {
      const h = Number(row[c.col] || 0);
      if (h <= 0) return '';
      const px = Math.max(4, Math.round((h / maxStack) * 60));
      return `<div class="day-bar ${c.cls}-bg" style="height:${px}px" title="${c.label}: ${fmt(h)}h"></div>`;
    }).join('');
    const hasAny = CATS.some(c => Number(row[c.col] || 0) > 0);
    return `<div class="day-col${isToday?' day-today':''}">
      <div class="day-label">${dayName}</div>
      <div class="day-bar-wrap">${hasAny ? bars : '<div style="height:4px;background:#374151;border-radius:3px;opacity:.4"></div>'}</div>
    </div>`;
  }).join('');

  // Editable table for the last 30 days
  const tableRows = allDays.map(d => {
    const row = DATA[d] || {};
    const isToday = d === today;
    const cells = CATS.map(c => {
      const v = row[c.col] != null ? Number(row[c.col]).toFixed(2).replace(/\.?0+$/, '') : '';
      return `<td><input class="hours" type="number" step="0.25" min="0" max="24"
        value="${v}" data-date="${d}" data-col="${c.col}" placeholder="0"></td>`;
    }).join('');
    const dateLabel = new Date(d + 'T12:00:00').toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
    return `<tr${isToday?' class="today-row"':''}>
      <td style="color:#9ca3af;white-space:nowrap">${dateLabel}${isToday?' <span style="color:#a78bfa;font-size:11px;font-weight:600">· today</span>':''}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="goal-cards">${goalCards}</div>

    <div class="week-section">
      <h2>This week</h2>
      <div class="week-grid">${weekGrid}</div>
      <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap">
        ${CATS.map(c=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280"><div style="width:8px;height:8px;border-radius:2px;" class="${c.cls}-bg"></div>${c.label}: ${weekDaysHit[c.key]}/7 days hit</div>`).join('')}
      </div>
    </div>

    <div class="log-section">
      <h2>Edit hours · last ${DAYS_BACK} days</h2>
      <div class="log-wrap">
        <table class="log-table">
          <thead><tr><th>Date</th>${CATS.map(c=>`<th><span class="cat-dot ${c.cls}-bg"></span>${c.label}</th>`).join('')}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#6b7280">Edits save automatically when you click off a field.</div>
    </div>
  `;

  // Wire up save-on-blur for each input
  document.querySelectorAll('input.hours').forEach(input => {
    input.addEventListener('blur', () => saveCell(input));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
    });
  });
}

async function saveCell(input) {
  const date = input.dataset.date;
  const col = input.dataset.col;
  const raw = input.value.trim();
  const value = raw === '' ? null : Number(raw);

  if (raw !== '' && (isNaN(value) || value < 0 || value > 24)) {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 1500);
    return;
  }

  input.classList.remove('saved', 'error');
  input.classList.add('saving');

  // Update local cache optimistically
  if (!DATA[date]) DATA[date] = { date };
  DATA[date][col] = value;

  const payload = { date, [col]: value };
  const { error } = await window.sb
    .from('daily_checkins')
    .upsert(payload, { onConflict: 'date' });

  input.classList.remove('saving');
  if (error) {
    input.classList.add('error');
    console.error('save failed', error);
    return;
  }
  input.classList.add('saved');
  setTimeout(() => input.classList.remove('saved'), 1200);

  // Re-render the goal cards + week grid (cheap) without losing input focus
  // by only refreshing the headline sections
  refreshHeadlines();
}

function refreshHeadlines() {
  const today = todayISO();
  const weekDays = getWeekDays();
  const todayRow = DATA[today] || {};
  const weekTotals = { hoot: 0, finnian: 0, tempo: 0 };
  for (const d of weekDays) {
    const row = DATA[d] || {};
    for (const c of CATS) weekTotals[c.key] += Number(row[c.col] || 0);
  }
  // Update goal card numbers
  CATS.forEach((c, i) => {
    const card = document.querySelectorAll('.goal-card')[i];
    if (!card) return;
    const todayH = Number(todayRow[c.col] || 0);
    card.querySelector('.hours-big').textContent = fmt(todayH) + 'h';
    card.querySelector('.sub').textContent = `today · ${fmt(weekTotals[c.key])}h this week`;
    const pct = Math.min(100, Math.round((todayH / GOAL_HOURS) * 100));
    card.querySelector('.bar-fill').style.width = pct + '%';
    const met = todayH >= GOAL_HOURS;
    const badge = card.querySelector('.status-badge');
    badge.className = 'status-badge ' + (met ? 'badge-ok' : todayH > 0 ? 'badge-partial' : 'badge-miss');
    badge.textContent = met ? '✓ Goal met' : todayH > 0 ? `${(GOAL_HOURS - todayH).toFixed(1)}h to go` : 'Not started';
  });
}

async function load() {
  await window._authReadyPromise;
  const cutoff = dateRange(DAYS_BACK)[DAYS_BACK - 1];
  const { data, error } = await window.sb
    .from('daily_checkins')
    .select('date, hoot_hours, finnian_hours, tempo_hours')
    .gte('date', cutoff)
    .order('date', { ascending: false });

  if (error) {
    document.getElementById('app').innerHTML = `<div class="empty">Error loading: ${error.message}</div>`;
    return;
  }
  DATA = {};
  for (const row of (data || [])) DATA[row.date] = row;
  render();
}

load();
</script>
</body>
</html>
