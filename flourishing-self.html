<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111827">
  <title>Flourishing Self · Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; font-size: 14px; }

    header { background: var(--card, #1f2937); border-bottom: 1px solid var(--border, #374151); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; padding-top: max(12px, env(safe-area-inset-top)); }
    .logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
    .nav-links a { font-size: 13px; color: #9ca3af; text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background .15s; white-space: nowrap; }
    .nav-links a:hover { background: #374151; color: #f3f4f6; }
    .nav-links a.active { background: #7c3aed; color: #fff; }

    main { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-header { margin-bottom: 40px; border-bottom: 1px solid #374151; padding-bottom: 24px; }
    .page-header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .page-header .subtitle { font-size: 13px; color: #6b7280; font-style: italic; }
    .last-updated { font-size: 12px; color: #4b5563; margin-top: 8px; }

    /* Table of contents */
    .toc { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 20px 24px; margin-bottom: 40px; }
    .toc h3 { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .toc-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .toc-links a { font-size: 13px; color: #a78bfa; text-decoration: none; padding: 4px 12px; border-radius: 20px; border: 1px solid #374151; transition: all .15s; }
    .toc-links a:hover { background: #7c3aed; border-color: #7c3aed; color: #fff; }

    /* Markdown rendered content */
    .content h1 { font-size: 22px; font-weight: 700; color: #f3f4f6; margin: 48px 0 20px; padding-bottom: 10px; border-bottom: 1px solid #374151; }
    .content h1:first-child { margin-top: 0; }
    .content h2 { font-size: 16px; font-weight: 600; color: #a78bfa; margin: 32px 0 12px; }
    .content h3 { font-size: 14px; font-weight: 600; color: #60a5fa; margin: 20px 0 8px; }
    .content p { color: #d1d5db; line-height: 1.7; margin-bottom: 12px; }
    .content ul { padding-left: 20px; margin-bottom: 12px; }
    .content ul li { color: #d1d5db; line-height: 1.8; }
    .content ul li ul { margin-top: 4px; margin-bottom: 4px; }
    .content ul li ul li { color: #9ca3af; font-size: 13px; }
    .content strong { color: #f3f4f6; font-weight: 600; }
    .content em { color: #9ca3af; font-style: italic; }
    .content hr { border: none; border-top: 1px solid #1f2937; margin: 32px 0; }
    .content blockquote { border-left: 3px solid #7c3aed; padding-left: 16px; margin: 16px 0; color: #9ca3af; font-style: italic; font-family: 'Lora', Georgia, serif; }

    /* Tables */
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
    .content th { background: #1f2937; color: #9ca3af; font-weight: 600; text-align: left; padding: 10px 14px; border: 1px solid #374151; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .content td { padding: 10px 14px; border: 1px solid #1f2937; color: #d1d5db; vertical-align: top; }
    .content tr:nth-child(even) td { background: #1a2232; }

    /* Instructions block */
    .instructions-block { background: #1a2535; border: 1px solid #4b5563; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; }
    .instructions-block p { color: #d1d5db; font-size: 13px; line-height: 1.7; margin: 0; }
    .instructions-block strong { color: #f3f4f6; }

    /* Section containers */
    .section-block { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 24px; margin-bottom: 16px; }

    /* Loading state */
    .loading { text-align: center; padding: 80px 24px; color: #6b7280; }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid #374151; border-top-color: #7c3aed; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { background: #1f2937; border: 1px solid #ef4444; border-radius: 12px; padding: 24px; color: #fca5a5; text-align: center; }

    footer { text-align: center; padding: 24px; color: #374151; font-size: 12px; }
    /* ===== Mobile hamburger ===== */
    .nav-toggle {
      display: none; background: transparent; border: none; cursor: pointer;
      padding: 6px 8px; margin-left: auto; color: var(--text, #f3f4f6);
    }
    .nav-toggle svg { display: block; width: 22px; height: 22px; }
    @media (max-width: 600px) {
      .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
      .nav-links {
        position: fixed; top: 49px; left: 0; right: 0; bottom: 0;
        background: #1f2937; border-bottom: 1px solid #374151;
        flex-direction: column; gap: 0; padding: 6px 0;
        margin-left: 0; align-items: stretch;
        max-height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s ease;
        z-index: 100;
      }
      .nav-links.open { max-height: calc(100vh - 49px); overflow-y: auto; padding: 6px 0; }
      .nav-links a { padding: 14px 24px; border-radius: 0; font-size: 15px; }
      header { position: sticky; top: 0; z-index: 101; overflow: hidden; }
    }
  </style>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>

</head>
<body>

<header>
  <a href="index.html" class="logo">Second Brain</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="alignment.html">Alignment</a>
    <a href="fitness.html">Fitness</a>
    <a href="reset.html">Reset</a>
    <a href="journal.html">Journal</a>
    <a href="flourishing-self.html" class="active">Flourishing Self</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1>Flourishing Self</h1>
    <div class="subtitle">MMXXVI · The Year I Turned Pro</div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>

  <div id="instructions-block" class="instructions-block" style="display:none;">
    <div id="instructions-text"></div>
  </div>

  <div class="toc">
    <h3>Sections</h3>
    <div class="toc-links" id="toc-links"></div>
  </div>

  <div id="loadingState" class="loading">
    <div class="loading-spinner"></div>
    <p>Loading your Flourishing Self...</p>
  </div>

  <div id="content" class="content" style="display:none;"></div>
</main>

<footer>chrisgauthier9 · second-brain</footer>

<script>
  async function loadFlourishingSelf() {
    try {
      // Wait for the auth gate to confirm a session before reading.
      await window._authReadyPromise;
      const { data, error } = await window.sb
        .from('documents')
        .select('content, updated_at')
        .eq('slug', 'flourishing-self')
        .limit(1);

      if (error) throw error;
      if (!data || !data.length) throw new Error('Document not found');

      const { content, updated_at } = data[0];

      // Render markdown
      const html = marked.parse(content);
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').style.display = 'block';
      document.getElementById('loadingState').style.display = 'none';

      // Strip title h1 (FLOURISHING SELF) and subtitle h3 (MMXXVI) from rendered content
      const contentEl = document.getElementById('content');
      const firstH1 = contentEl.querySelector('h1');
      if (firstH1 && firstH1.textContent.toUpperCase().includes('FLOURISHING SELF')) {
        const nextEl = firstH1.nextElementSibling;
        if (nextEl && nextEl.tagName === 'H3') nextEl.remove();
        firstH1.remove();
      }

      // Extract instructions paragraph (the INSTRUCTIONS: bold block) into its own panel
      const instrEl = contentEl.querySelector('p strong');
      if (instrEl && instrEl.textContent.toUpperCase().includes('INSTRUCTIONS')) {
        const instrP = instrEl.closest('p');
        if (instrP) {
          document.getElementById('instructions-text').innerHTML = instrP.outerHTML;
          document.getElementById('instructions-block').style.display = 'block';
          instrP.remove();
        }
      }

      // Add anchor IDs to sections
      addAnchors();

      // Last updated
      if (updated_at) {
        const date = new Date(updated_at).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('lastUpdated').textContent = `Last updated: ${date}`;
      }

    } catch (err) {
      document.getElementById('loadingState').innerHTML = `
        <div class="error-state">
          <p>Could not load Flourishing Self: ${err.message}</p>
        </div>`;
    }
  }

  function addAnchors() {
    const tocLinks = document.getElementById('toc-links');
    tocLinks.innerHTML = '';
    document.querySelectorAll('.content h1').forEach(h1 => {
      const text = h1.textContent.trim();
      // Skip the page title
      if (text.toUpperCase().includes('FLOURISHING SELF')) return;
      const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      h1.id = id;
      const cleanText = text.replace(/\s*[—–-]+\s*(MASTER|THE)\s*.*/i, '').trim();
      const label = cleanText.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = label;
      tocLinks.appendChild(a);
    });
  }

  loadFlourishingSelf();
</script>


<script>
(function () {
  var nav = document.querySelector('header .nav-links');
  var hdr = document.querySelector('header');
  if (!nav || !hdr || hdr.querySelector('.nav-toggle')) return;
  var btn = document.createElement('button');
  btn.className = 'nav-toggle';
  btn.setAttribute('aria-label', 'Open menu');
  btn.setAttribute('aria-expanded', 'false');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';
  hdr.insertBefore(btn, nav);
  function close() { nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.addEventListener('click', function(e) {
    if (!nav.classList.contains('open')) return;
    if (nav.contains(e.target) || btn.contains(e.target)) return;
    close();
  });
  nav.addEventListener('click', function(e) { if (e.target.tagName === 'A') close(); });
})();
</script>
</body>
</html>
