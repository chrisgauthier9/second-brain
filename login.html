<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Sign In – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280;
      --accent: #7c3aed;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 32px; width: 100%; max-width: 360px; text-align: center;
    }
    .logo {
      font-size: 22px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    button {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #24292e; color: white; border: 1px solid var(--border);
      font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color .15s, transform .05s;
    }
    button:hover { border-color: var(--accent); }
    button:active { transform: scale(0.99); }
    button:disabled { opacity: 0.6; cursor: wait; }
    .err { color: #f87171; font-size: 12px; margin-top: 14px; min-height: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Second Brain</div>
    <div class="sub">Sign in to continue</div>
    <button id="ghBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.18c-3.2.7-3.87-1.37-3.87-1.37-.52-1.34-1.27-1.69-1.27-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.69 1.25 3.35.96.1-.74.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.18 1.18a11.07 11.07 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.26 5.69.41.36.78 1.06.78 2.14v3.17c0 .31.21.68.79.56C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
      <span>Sign in with GitHub</span>
    </button>
    <div class="err" id="err"></div>
  </div>
  <script>
    const SUPABASE_URL = 'https://pkdbzoptboinysspnpjp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3AzsiWvSIyBQ876U61ahbQ_vQtkdO6J';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    // If we just came back from OAuth or already have a session, go home.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('index.html');
    });

    document.getElementById('ghBtn').addEventListener('click', async () => {
      const btn = document.getElementById('ghBtn');
      const err = document.getElementById('err');
      btn.disabled = true; err.textContent = '';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: window.location.origin + window.location.pathname.replace(/login\.html$/, 'index.html') },
      });
      if (error) {
        btn.disabled = false;
        err.textContent = error.message;
      }
    });
  </script>
</body>
</html>
