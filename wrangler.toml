name = "second-brain"
main = "_worker.js"
compatibility_date = "2026-05-16"
compatibility_flags = ["nodejs_compat"]

# Static assets — serve all root files as static content
# The Worker's `env.ASSETS.fetch(request)` falls through to these
[assets]
directory = "./"
binding = "ASSETS"

# KV namespace — must be declared here so it survives deploys
# (Cloudflare wipes dashboard-only bindings on every deploy)
[[kv_namespaces]]
binding = "SECOND_BRAIN_KV"
id = "496ff6d3254343ee9951643c4a166440"

# Note: GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are runtime secrets,
# set via dashboard or `npx wrangler secret put`. Wrangler preserves
# secrets across deploys by default (unlike plain text vars).
