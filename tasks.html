<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Tasks – Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827; --card: #1f2937; --border: #374151; --deep: #0f172a;
      --text: #f3f4f6; --muted: #9ca3af; --dim: #6b7280;
      --accent: #7c3aed; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
      --surface: #1a2332;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overscroll-behavior: none; }

    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; padding-top: max(12px, env(safe-area-inset-top)); }
    .logo { font-size: 16px; font-weight: 700; color: #a78bfa; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--accent); color: #fff; }
    .nav-toggle { display: none; background: transparent; border: none; cursor: pointer; padding: 6px 8px; margin-left: auto; color: var(--text); }
    .nav-toggle svg { display: block; width: 22px; height: 22px; }
    .refresh-btn { display: none; background: transparent; border: none; cursor: pointer; padding: 6px 8px; color: var(--text); flex-shrink: 0; }
    .refresh-btn svg { display: block; width: 20px; height: 20px; }

    main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar-filters { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
    .add-btn { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .add-btn:hover { opacity: .9; }

    /* Group headers */
    .group-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); padding: 12px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .group-header .count { background: var(--border); color: var(--muted); padding: 2px 7px; border-radius: 999px; font-size: 10px; }

    /* Task rows */
    .task-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start;
      gap: 10px; cursor: pointer; transition: border-color .15s;
    }
    .task-row:hover { border-color: var(--accent); }
    .task-row.complete { opacity: .5; }
    .task-row.complete .task-title { text-decoration: line-through; }
    .task-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: all .15s; }
    .task-check.checked { background: var(--ok); border-color: var(--ok); color: #0f1d18; font-weight: 700; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .tag.bucket { background: rgba(124,58,237,.15); color: #a78bfa; }
    .tag.priority-high { background: rgba(248,113,113,.15); color: #f87171; }
    .tag.priority-medium { background: rgba(251,191,36,.15); color: #fbbf24; }
    .tag.priority-low { background: rgba(107,114,128,.15); color: var(--muted); }
    .tag.due { background: rgba(52,211,153,.1); color: var(--ok); }
    .tag.due.overdue { background: rgba(248,113,113,.15); color: #f87171; }
    .tag.estimate { background: rgba(59,91,122,.3); color: var(--muted); }
    .task-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Status colors */
    .status-Today { background: #ec4899; }
    .status-To-Do { background: #fbbf24; }
    .status-Up-Next { background: #f59e0b; }
    .status-Later { background: var(--dim); }
    .status-Projects { background: #f97316; }
    .status-In-Progress { background: #3b82f6; }
    .status-Complete { background: var(--ok); }
    .status-Canceled { background: var(--dim); opacity: .5; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 720px; max-height: 92vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { background: var(--deep); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { color: var(--text); }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); margin-bottom: 5px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 10px 12px; background: var(--deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; outline: none;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
    .form-row select option { background: var(--deep); }
    .form-row textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { opacity: .9; }
    .btn-danger { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.3); padding: 12px 16px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-danger:hover { background: rgba(248,113,113,.25); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 13px; }

    .inbox-section { background: rgba(251,191,36,.06); border: 1px solid rgba(251,191,36,.25); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .inbox-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .inbox-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #fbbf24; display: flex; align-items: center; gap: 6px; }
    .inbox-label .inbox-dot { width: 7px; height: 7px; border-radius: 50%; background: #fbbf24; display: inline-block; }
    .inbox-count { background: rgba(251,191,36,.2); color: #fbbf24; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }
    .inbox-empty { font-size: 12px; color: var(--dim); padding: 8px 0; }

    .quick-add { display: flex; gap: 8px; margin-bottom: 8px; }
    .quick-add input { flex: 1; padding: 10px 12px; background: var(--deep); border: 1px solid rgba(251,191,36,.3); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
    .quick-add input:focus { border-color: #fbbf24; }
    .quick-add input::placeholder { color: var(--dim); }
    .quick-add-btn { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .quick-add-btn:hover { background: rgba(251,191,36,.25); }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* Progress bar for time spent */
    .time-bar { height: 3px; background: var(--border); border-radius: 999px; margin-top: 6px; overflow: hidden; }
    .time-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
    .time-bar-fill.over { background: var(--err); }

    /* View toggle */
    .view-tabs { display: flex; gap: 4px; background: var(--deep); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .view-tab { flex: 1; padding: 8px 0; border: none; border-radius: 7px; background: transparent; color: var(--dim); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: .03em; }
    .view-tab.active { background: var(--card); color: var(--text); }

    @media (max-width: 600px) {
      .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
      .refresh-btn { display: inline-flex; align-items: center; justify-content: center; }
      .nav-links {
        position: fixed; top: 49px; left: 0; right: 0; bottom: 0;
        background: #1f2937; flex-direction: column; gap: 0; padding: 6px 0;
        max-height: 0; height: 0; overflow: hidden; transition: max-height .25s ease;
        z-index: 100;
      }
      .nav-links.open { max-height: calc(100vh - 49px); height: auto; overflow-y: auto; padding: 6px 0; }
      .nav-links a { padding: 14px 24px; border-radius: 0; font-size: 15px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">⬡ Second Brain</a>
  <nav class="nav-links" id="nav">
    <a href="index.html">Home</a>
    <a href="alignment.html">Alignment</a>
    <a href="fitness.html">Fitness</a>
    <a href="tasks.html" class="active">Tasks</a>
    <a href="reset.html">Reset</a>
    <a href="journal.html">Journal</a>
    <a href="flourishing-self.html">Flourishing Self</a>
  </nav>
  <button class="refresh-btn" onclick="load()" aria-label="Refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
  </button>
  <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>

<main>
  <h1>Tasks</h1>

  <div class="view-tabs">
    <button class="view-tab active" data-view="active" onclick="setView('active')">Active</button>
    <button class="view-tab" data-view="bucket" onclick="setView('bucket')">By Bucket</button>
    <button class="view-tab" data-view="all" onclick="setView('all')">All</button>
  </div>

  <div class="toolbar">
    <div class="toolbar-filters" id="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="Today" onclick="setFilter('Today')">Today</button>
      <button class="filter-btn" data-filter="In Progress" onclick="setFilter('In Progress')">In Progress</button>
      <button class="filter-btn" data-filter="Up Next" onclick="setFilter('Up Next')">Up Next</button>
      <button class="filter-btn" data-filter="1. Hoot" onclick="setFilter('1. Hoot')">Hoot</button>
      <button class="filter-btn" data-filter="1. Finnian" onclick="setFilter('1. Finnian')">Finnian</button>
      <button class="filter-btn" data-filter="1. Tempo" onclick="setFilter('1. Tempo')">Tempo</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Task</button>
  </div>

  <div id="view"></div>
</main>

<!-- Task Modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Task</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-row">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="What needs to get done?" autocomplete="off">
    </div>

    <div class="form-grid">
      <div class="form-row">
        <label>Bucket</label>
        <select id="f-bucket">
          <option value="">— none —</option>
          <optgroup label="1. Work">
            <option>1. Finnian</option>
            <option>1. Tempo</option>
            <option>1. Hoot</option>
          </optgroup>
          <optgroup label="2. Personal Growth">
            <option>2. Personal Dev</option>
            <option>2. Thoughts &amp; Ideas</option>
          </optgroup>
          <optgroup label="3. Fitness">
            <option>3. Fitness</option>
          </optgroup>
          <optgroup label="4. Admin &amp; Routine">
            <option>4. Chores</option>
            <option>4. Grocery List</option>
            <option>4. Shopping List</option>
            <option>4. Splitwise Inbox</option>
            <option>4. Get From Perth</option>
          </optgroup>
          <optgroup label="5. Leisure">
            <option>5. Laleh</option>
            <option>5. Leisure</option>
          </optgroup>
        </select>
      </div>
      <div class="form-row">
        <label>Status</label>
        <select id="f-status">
          <option>To Do</option>
          <option>Today</option>
          <option>Up Next</option>
          <option>Later</option>
          <option>Projects</option>
          <option>In Progress</option>
          <option>Complete</option>
          <option>Canceled</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>Priority</label>
      <select id="f-priority">
        <option value="none">None</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>

    <div class="form-grid">
      <div class="form-row">
        <label>Due Date</label>
        <input type="date" id="f-due">
      </div>
      <div class="form-row">
        <label>Due Time</label>
        <input type="time" id="f-due-time">
      </div>
    </div>

    <div class="form-grid">
      <div class="form-row">
        <label>Time Estimate (hrs)</label>
        <input type="number" id="f-estimate" step="0.25" min="0" placeholder="—">
      </div>
      <div class="form-row">
        <label>Time Spent (hrs)</label>
        <input type="number" id="f-spent" step="0.25" min="0" placeholder="—">
      </div>
    </div>

    <div class="form-row">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Additional context..."></textarea>
    </div>

    <div class="form-row">
      <label>URL</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>

    <div class="form-actions" id="form-actions">
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
<script>
  let TASKS = [];
  let CURRENT_VIEW = 'active';
  let CURRENT_FILTER = 'all';
  let EDITING_ID = null;

  const STATUS_ORDER = ['Today', 'In Progress', 'Projects', 'Up Next', 'To Do', 'Later', 'Complete', 'Canceled'];
  const STATUS_COLORS = {
    'Today': '#ec4899', 'To Do': '#fbbf24', 'Up Next': '#f59e0b',
    'Later': '#6b7280', 'Projects': '#f97316', 'In Progress': '#3b82f6',
    'Complete': '#34d399', 'Canceled': '#4b5563'
  };

  const ACTIVE_STATUSES = new Set(['Today', 'To Do', 'Up Next', 'Later', 'Projects', 'In Progress']);

  async function load() {
    const { data, error } = await window.sb.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) {
      document.getElementById('view').innerHTML = `<div class="loading">Error: ${error.message}</div>`;
      return;
    }
    TASKS = data || [];
    render();
  }

  function setView(v) {
    CURRENT_VIEW = v;
    document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
    render();
  }

  function setFilter(f) {
    CURRENT_FILTER = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  function getFilteredTasks() {
    let tasks = TASKS;
    if (CURRENT_VIEW === 'active') tasks = tasks.filter(t => ACTIVE_STATUSES.has(t.status));
    if (CURRENT_VIEW !== 'all' && CURRENT_VIEW !== 'active' ) tasks = TASKS;

    if (CURRENT_FILTER === 'all') return tasks;
    if (['Today', 'In Progress', 'Up Next'].includes(CURRENT_FILTER)) {
      return tasks.filter(t => t.status === CURRENT_FILTER);
    }
    return tasks.filter(t => t.bucket === CURRENT_FILTER);
  }

  function fmtDate(d, time) {
    if (!d) return null;
    const today = new Date().toISOString().split('T')[0];
    const diff = Math.round((new Date(d) - new Date(today)) / 86400000);
    let timeStr = '';
    if (time) {
      const [h, m] = time.split(':').map(Number);
      const period = h >= 12 ? 'pm' : 'am';
      const h12 = h % 12 || 12;
      timeStr = m === 0 ? ` at ${h12}${period}` : ` at ${h12}:${String(m).padStart(2,'0')}${period}`;
    }
    if (diff < 0) return { label: `${Math.abs(diff)}d overdue${timeStr}`, overdue: true };
    if (diff === 0) return { label: `Due today${timeStr}`, overdue: false };
    if (diff === 1) return { label: `Due tomorrow${timeStr}`, overdue: false };
    return { label: `Due ${new Date(d + 'T12:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric' })}${timeStr}`, overdue: false };
  }

  function taskHTML(t) {
    const isComplete = t.status === 'Complete' || t.status === 'Canceled';
    const due = t.due_date ? fmtDate(t.due_date, t.due_time) : null;
    const statusKey = t.status ? t.status.replace(/\s+/g, '-') : '';
    const pct = t.time_estimate > 0 ? Math.min((t.time_spent || 0) / t.time_estimate * 100, 120) : 0;
    const over = pct > 100;

    return `
      <div class="task-row ${isComplete ? 'complete' : ''}" onclick="openModal('${t.id}')">
        <div class="task-check ${isComplete ? 'checked' : ''}" onclick="toggleComplete(event, '${t.id}')">
          ${isComplete ? '✓' : ''}
        </div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            ${t.bucket ? `<span class="tag bucket">${escHtml(t.bucket)}</span>` : ''}
            ${t.priority && t.priority !== 'none' ? `<span class="tag priority-${t.priority}">${t.priority}</span>` : ''}
            ${due ? `<span class="tag due ${due.overdue ? 'overdue' : ''}">${due.label}</span>` : ''}
            ${t.time_estimate ? `<span class="tag estimate">~${t.time_estimate}h${t.time_spent ? ` · ${t.time_spent}h spent` : ''}</span>` : ''}
          </div>
          ${t.time_estimate > 0 ? `<div class="time-bar"><div class="time-bar-fill ${over ? 'over' : ''}" style="width:${Math.min(pct,100)}%"></div></div>` : ''}
        </div>
        <div class="task-row-right">
          <div class="status-dot status-${statusKey}" title="${t.status || ''}"></div>
        </div>
      </div>`;
  }

  async function quickAdd() {
    const input = document.getElementById('quick-input');
    const title = input.value.trim();
    if (!title) return;
    const { data, error } = await window.sb.from('tasks').insert({
      title,
      status: 'To Do',
      priority: 'none'
    }).select().single();
    if (!error && data) {
      TASKS.unshift(data);
      input.value = '';
      render();
    }
  }

  function handleQuickKey(e) {
    if (e.key === 'Enter') quickAdd();
  }

  function getInboxTasks() {
    return TASKS.filter(t =>
      (!t.bucket || t.bucket === '') &&
      t.status !== 'Complete' && t.status !== 'Canceled'
    );
  }

  function inboxHTML() {
    const items = getInboxTasks();
    return `
      <div class="inbox-section">
        <div class="inbox-header">
          <span class="inbox-label"><span class="inbox-dot"></span>Inbox — needs triage</span>
          ${items.length > 0 ? `<span class="inbox-count">${items.length}</span>` : ''}
        </div>
        <div class="quick-add">
          <input type="text" id="quick-input" placeholder="Quick add — tap to triage later..." onkeydown="handleQuickKey(event)" autocomplete="off">
          <button class="quick-add-btn" onclick="quickAdd()">Add</button>
        </div>
        ${items.length === 0
          ? '<div class="inbox-empty">Inbox clear ✓</div>'
          : items.map(taskHTML).join('')
        }
      </div>`;
  }

  function render() {
    const tasks = getFilteredTasks();
    const el = document.getElementById('view');

    // Always show inbox on active and all views
    const showInbox = CURRENT_VIEW !== 'bucket';
    const inboxHtml = showInbox ? inboxHTML() : '';

    // Filter out inbox items from main list to avoid duplication
    const inboxIds = new Set(getInboxTasks().map(t => t.id));
    const mainTasks = showInbox ? tasks.filter(t => !inboxIds.has(t.id)) : tasks;

    if (mainTasks.length === 0 && !showInbox) {
      el.innerHTML = `<div class="empty-state">No tasks here. Add one above.</div>`;
      return;
    }

    if (CURRENT_VIEW === 'bucket') {
      const buckets = {};
      mainTasks.forEach(t => {
        const b = t.bucket || 'Uncategorized';
        if (!buckets[b]) buckets[b] = [];
        buckets[b].push(t);
      });
      el.innerHTML = inboxHtml + Object.entries(buckets).map(([bucket, items]) => `
        <div class="group-header">${escHtml(bucket)} <span class="count">${items.length}</span></div>
        ${items.map(taskHTML).join('')}
      `).join('');
      return;
    }

    // Active / All — group by status
    const groups = {};
    STATUS_ORDER.forEach(s => { groups[s] = []; });
    mainTasks.forEach(t => { if (groups[t.status]) groups[t.status].push(t); });

    el.innerHTML = inboxHtml + STATUS_ORDER.filter(s => groups[s].length > 0).map(status => `
      <div class="group-header">
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${STATUS_COLORS[status]};display:inline-block"></span>
          ${status}
        </span>
        <span class="count">${groups[status].length}</span>
      </div>
      ${groups[status].map(taskHTML).join('')}
    `).join('');
  }

  async function toggleComplete(e, id) {
    e.stopPropagation();
    const task = TASKS.find(t => t.id === id);
    if (!task) return;
    const newStatus = (task.status === 'Complete') ? 'To Do' : 'Complete';
    await window.sb.from('tasks').update({ status: newStatus }).eq('id', id);
    task.status = newStatus;
    render();
  }

  function openModal(id) {
    EDITING_ID = id || null;
    const modal = document.getElementById('modal');
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('hidden');

    if (id) {
      const t = TASKS.find(t => t.id === id);
      if (!t) return;
      document.getElementById('modal-title').textContent = 'Edit Task';
      document.getElementById('f-title').value = t.title || '';
      document.getElementById('f-bucket').value = t.bucket || '';
      document.getElementById('f-status').value = t.status || 'To Do';
      document.getElementById('f-priority').value = t.priority || 'none';
      document.getElementById('f-due').value = t.due_date || '';
      document.getElementById('f-due-time').value = t.due_time ? t.due_time.substring(0,5) : '';
      document.getElementById('f-estimate').value = t.time_estimate || '';
      document.getElementById('f-spent').value = t.time_spent || '';
      document.getElementById('f-notes').value = t.notes || '';
      document.getElementById('f-url').value = t.url || '';
      document.getElementById('form-actions').innerHTML = `
        <button class="btn-danger" onclick="deleteTask('${id}')">Delete</button>
        <button class="btn-primary" onclick="saveTask()">Save Changes</button>
      `;
    } else {
      document.getElementById('modal-title').textContent = 'New Task';
      document.getElementById('f-title').value = '';
      document.getElementById('f-bucket').value = '';
      document.getElementById('f-status').value = 'To Do';
      document.getElementById('f-priority').value = 'none';
      document.getElementById('f-due').value = '';
      document.getElementById('f-due-time').value = '';
      document.getElementById('f-estimate').value = '';
      document.getElementById('f-spent').value = '';
      document.getElementById('f-notes').value = '';
      document.getElementById('f-url').value = '';
      document.getElementById('form-actions').innerHTML = `
        <button class="btn-primary" onclick="saveTask()">Save Task</button>
      `;
    }
    setTimeout(() => document.getElementById('f-title').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    EDITING_ID = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  async function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const payload = {
      title,
      bucket: document.getElementById('f-bucket').value || null,
      status: document.getElementById('f-status').value || 'To Do',
      priority: document.getElementById('f-priority').value || 'none',
      due_date: document.getElementById('f-due').value || null,
      due_time: document.getElementById('f-due-time').value || null,
      time_estimate: parseFloat(document.getElementById('f-estimate').value) || null,
      time_spent: parseFloat(document.getElementById('f-spent').value) || 0,
      notes: document.getElementById('f-notes').value.trim() || null,
      url: document.getElementById('f-url').value.trim() || null,
    };

    if (EDITING_ID) {
      const { error } = await window.sb.from('tasks').update(payload).eq('id', EDITING_ID);
      if (!error) {
        const idx = TASKS.findIndex(t => t.id === EDITING_ID);
        if (idx >= 0) TASKS[idx] = { ...TASKS[idx], ...payload };
      }
    } else {
      const { data, error } = await window.sb.from('tasks').insert(payload).select().single();
      if (!error && data) TASKS.unshift(data);
    }

    closeModal();
    render();
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    await window.sb.from('tasks').delete().eq('id', id);
    TASKS = TASKS.filter(t => t.id !== id);
    closeModal();
    render();
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Nav hamburger
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav').classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    const nav = document.getElementById('nav');
    const btn = document.getElementById('nav-toggle');
    if (nav.classList.contains('open') && !nav.contains(e.target) && !btn.contains(e.target)) {
      nav.classList.remove('open');
    }
  });

  window._authReadyPromise.then(() => {
    document.documentElement.style.visibility = '';
    document.body.style.visibility = '';
    load();
  });

  // Safety net — show page after 3s regardless
  setTimeout(() => { document.documentElement.style.visibility = ''; document.body.style.visibility = ''; }, 3000);
</script>
</body>
</html>
